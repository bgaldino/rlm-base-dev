  deploy_post_tso:
    description: Deploy Trialforce Source Org Metadata (App Launcher now deploys via prepare_ux/assemble_and_deploy_ux)
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_tso

  deploy_post_prm:
    description: Deploy Partner Relationship Management Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_prm

  deploy_post_personas:
    group: Revenue Lifecycle Management
    description: Deploy persona metadata (profiles, permission set groups, permission sets) from unpackaged/post_personas.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_personas

  deploy_post_approvals:
    description: >
      Deploy Advanced Approvals metadata: Quote/QuoteLineItem fields, RLM_Payment_Terms GVS,
      PathAssistant, quickAction, flows (RLM_Quote_Smart_Approval, RLM_Quote_Approval_Data),
      Apex class, and permission set. EmailTemplatePage FlexiPages (including
      RLM_Quote_Record_Page) are excluded via .forceignore — EmailTemplatePage type cannot be
      deployed via Metadata API (platform restriction); Lightning Email Templates are created
      separately by create_approval_email_templates.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_approvals

  create_approval_email_templates:
    group: Revenue Lifecycle Management
    description: >
      Create Lightning Email Templates for RLM Approval notifications from the dataset CSV.
      Reads EmailTemplate.csv from datasets/sfdmu/qb/en-US/qb-approvals/ and creates
      SFX-type (Lightning) EmailTemplate records in the target org, then links them to
      ApprovalAlertContentDef records. Idempotent: skips templates that already exist.
      Required before insert_qb_approvals_data. EmailTemplatePage FlexiPages cannot be
      deployed via Metadata API (platform restriction).
    class_path: tasks.rlm_create_approval_email_templates.CreateApprovalEmailTemplates
  
  deploy_docgen_seller_fields:
    description: >
      Deploy RLM_Seller_*__c, RLM_Account_Name__c, and RLM_Sales_Rep_Name__c formula fields
      on Quote before the main DocGen metadata deploy. The OmniDataTransform records reference
      these custom fields by name; Salesforce validates field existence on INSERT (fresh org),
      so the fields must exist before the ODTs are deployed. Targets only the Quote fields
      subdirectory to avoid the Quote object-meta.xml action overrides, which reference
      flexipages not yet deployed at this stage.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_docgen/objects/Quote/fields

  deploy_docgen_qli_fields:
    description: >
      Deploy RLM_ProductName__c formula field on QuoteLineItem before the main DocGen metadata
      deploy. The OmniDataTransform records reference this field in inputFieldName; Salesforce
      validates field existence on INSERT (fresh org), so it must exist before the ODTs are
      deployed. QuoteLineItem has no object-meta.xml, so the whole directory is safe to deploy early.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_docgen/objects/QuoteLineItem

  deploy_docgen_odt_seed:
    description: >
      Seed-insert minimal OmniDataTransform shell records (RLMQuoteExtractBasic,
      RLMQuoteTransformBasic, RLMQuoteProposalExtract, RLMQuoteProposalTransform)
      before the full DocGen deploy. Salesforce rejects INSERT of ODTs that reference
      custom formula fields in inputFieldName (-692085439) but accepts UPDATE of existing
      records. This step creates the ODT stubs so the subsequent deploy_post_docgen runs
      as an UPDATE.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/pre_docgen

  deploy_post_docgen:
    description: Deploy Document Generation Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_docgen

  activate_docgen_templates:
    group: Revenue Lifecycle Management
    description: Activate the latest version of each RLM_ OmniStudio DocumentTemplate. DocumentTemplates always deploy as inactive; this script finds the highest version per template name and sets IsActive = true.
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      path: scripts/apex/activateDocgenTemplates.apex

  fix_document_template_binaries:
    group: Revenue Lifecycle Management
    description: >
      Corrects DocumentTemplate ContentDocument binaries after a batch metadata deploy.
      Salesforce metadata API bug: all DocumentTemplates deployed in a single batch
      receive the same ContentDocument binary (first alphabetically). This task uploads
      the correct .dt binary from the repo for each RLM_ template, replacing the wrong
      ContentDocument content. Run after deploy_post_docgen + activate_docgen_templates.
    class_path: tasks.rlm_docgen.FixDocumentTemplateBinaries

  deploy_post_constraints:
    description: Deploy Constraints Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_constraints

  deploy_post_utils:
    description: Deploy Utils Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_utils

  deploy_post_commerce:
    description: Deploy Commerce Metadata (e.g. Commerce decision table flows)
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_commerce

  deploy_post_procedureplans:
    description: Deploy Procedure Plans Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_procedureplans
  
  deploy_post_procedureplans_objects:
    description: Deploy Procedure Plans Objects
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_procedureplans/objects

  deploy_post_procedureplans_classes:
    description: Deploy Procedure Plans Classes
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_procedureplans/classes

  deploy_post_procedureplans_permissionsets:
    description: Deploy Procedure Plans Permissionsets
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_procedureplans/permissionsets

  deploy_post_billing:
    description: Deploy Billing Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_billing

  deploy_billing_id_settings:
    description: Deploy Billing Settings with org-specific record IDs (resolved via XPath transform queries at deploy time)
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Revenue Lifecycle Management
    options:
      path: unpackaged/post_billing_id_settings
      transforms:
        - transform: find_replace
          options:
            patterns:
              - xpath: //BillingSettings/defaultBillingTreatment[text()="__DEFAULT_BILLING_TREATMENT_ID__"]
                replace_record_id_query: SELECT Id FROM BillingTreatment WHERE Name = 'Billing Treatment - USA - Advance' AND Status = 'Active' LIMIT 1
                api: rest
              - xpath: //BillingSettings/defaultLegalEntity[text()="__DEFAULT_LEGAL_ENTITY_ID__"]
                replace_record_id_query: SELECT Id FROM LegalEntity WHERE Name = 'Default Legal Entity - US' LIMIT 1
                api: rest
              - xpath: //BillingSettings/defaultTaxTreatment[text()="__DEFAULT_TAX_TREATMENT_ID__"]
                replace_record_id_query: SELECT Id FROM TaxTreatment WHERE Name = 'Default Tax Policy' AND Status = 'Active' LIMIT 1
                api: rest

  deploy_billing_template_settings:
    description: Re-enable Invoice Email/PDF toggles to trigger default template auto-creation (cycle step 3)
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Revenue Lifecycle Management
    options:
      path: unpackaged/post_billing_template_settings

  deploy_post_guidedselling:
    description: Deploy Guided Selling Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_guidedselling

  assemble_and_deploy_ux:
    group: UX Personalization
    description: >
      Assembles feature-conditional UX metadata (flexipages, layouts, applications,
      app menus, profiles) from base templates and YAML patch files in templates/.
      Writes assembled SFDX-format output to unpackaged/post_ux/ (git-tracked) and
      deploys in a single sf project deploy start call. Supports granular invocation
      via metadata_type and metadata_name options for development and debugging.
    class_path: tasks.rlm_ux_assembly.AssembleAndDeployUX

  reorder_app_launcher:
    group: UX Personalization
    description: >
      Applies a priority order to the App Launcher. The Python task queries all AppMenuItem
      records via the Salesforce REST API (SOQL), builds a priority-ordered ApplicationId
      list (priority_app_labels first, remaining apps after in their current relative order),
      and passes the list to a Robot Framework test. The Robot test navigates to the Lightning
      home page and calls Aura AppLauncherController/saveOrder via synchronous XHR — no modal
      or DOM scraping required. Required on Trialforce-based orgs where the Metadata API cannot
      deploy an AppSwitcher containing managed ConnectedApp or Network entries and
      AppMenuItem.SortOrder is platform read-only via all other APIs.
    class_path: tasks.rlm_reorder_app_launcher.ReorderAppLauncher
    options:
      suite: robot/rlm-base/tests/setup/reorder_app_launcher.robot
      outputdir: robot/rlm-base/results

  deploy_post_collections:
    group: Revenue Lifecycle Management
    description: >
      Deploy Collections metadata from unpackaged/post_collections (flows, objects,
      omniUiCard, permissionsets, queues, quickActions, tabs,
      timelineObjectDefinitions). Flexipages and applications for collections are
      deployed via assemble_and_deploy_ux (prepare_ux flow) — they are excluded
      here via .forceignore.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_collections

  deploy_post_ramp_builder:
    group: Revenue Lifecycle Management
    description: >
      Deploy all Ramp Schedule Builder (Create Ramp Schedule V4) metadata under
      unpackaged/post_ramp_builder: RLM_RampMode__c (Picklist) on QuoteLineGroup,
      QuoteLineItem, OrderItemGroup, and OrderItem; RLM_UpliftPercent__c (Percent) on
      QuoteLineGroup only; Lightning Message Channel (RLM_RampScheduleChannel); Apex classes
      and test classes (RLM_RampScheduleFlowAction, RLM_RampScheduleService,
      RLM_RampScheduleValidator, RLM_RampScheduleRequest, RLM_RampScheduleResponse,
      RLM_RampScheduleFlowException, RLM_RampMigrationQueueable, RLM_RampScheduleStatusController,
      RLM_QuoteLineItemDiscountUpliftHandler, RLM_QuoteLineItemRampModeHandler,
      RLM_QuoteLineItemRampHandler, and test classes); RLM_QuoteLineItemRampTrigger trigger; six LWC
      bundles (rlmRampScheduleFlowModalAction, rlmRampScheduleForm, rlmRampScheduleTrialSection,
      rlmRampSchedulePreviewTable, rlmRampScheduleStatus, rlmRampRefreshPage); the
      RLM_Create_Ramp_Schedule_V4 screen flow; the Quote.RLM_Create_Ramp_Schedule_V4 quick
      action; and the RLM_RampSchedule permission set (grants FLS on all custom fields and class
      access for all production Apex classes).
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_ramp_builder

  enable_analytics_replication:
    description: Enable CRM Analytics replication via browser automation (Robot/Selenium, Analytics Settings VF iframe)
    class_path: tasks.rlm_analytics.EnableAnalyticsReplication
    options:
      suite: robot/rlm-base/tests/setup/enable_analytics.robot
      outputdir: robot/rlm-base/results

  deploy_post_payments:
    description: Deploy Payments Metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_payments

  patch_payments_site_for_deploy:
    group: Revenue Lifecycle Management
    description: >
      Patch Payments_Webhook.site-meta.xml with the org's actual admin username before
      deploy. Required because siteAdmin and siteGuestRecordDefaultOwner are immutable
      after site creation and the committed XML contains a placeholder username.
    class_path: tasks.rlm_community.PatchPaymentsSiteForDeploy

  revert_payments_site_after_deploy:
    group: Revenue Lifecycle Management
    description: >
      Restore the placeholder siteAdmin and siteGuestRecordDefaultOwner in
      Payments_Webhook.site-meta.xml after deploy_post_payments_site so the repo
      never stores the target org's real username. Run AFTER deploy_post_payments_site.
    class_path: tasks.rlm_community.RevertPaymentsSiteAfterDeploy

  deploy_post_payments_site:
    description: Deploy Payments site settings only
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_payments/sites

  deploy_post_payments_settings:
    description: Deploy Payments Settings
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_payments_settings

  ensure_pricing_schedules:
    description: Ensure pricing schedules exist before expression sets
    class_path: tasks.rlm_repair_pricing_schedules.EnsurePricingSchedules
    options:
      disable_settings_path: tasks/resources/pricing_settings_disable
      enable_settings_path: unpackaged/pre/2_settings

  deploy_expression_sets:
    description: Deploy Expression Sets
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Revenue Lifecycle Management
    options:
      path: force-app/main/default/expressionSetDefinition
      transforms:
        - transform: find_replace
          options:
            patterns:
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__ATTRIBUTEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Attribute Based Adjustment' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__VOLUMEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Price Adjustment Tier' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__BUNDLEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Bundle Based Adjustment' LIMIT 1
                api: rest

  activate_and_deploy_expression_sets:
    description: Activate and Deploy Expression Sets
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Revenue Lifecycle Management
    options:
      path: force-app/main/default/expressionSetDefinition
      transforms:
        - transform: find_replace
          options:
            patterns:
              - xpath: //ExpressionSetDefinition/versions/status[text()="Draft"]
                replace: Active
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__ATTRIBUTEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Attribute Based Adjustment' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__VOLUMEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Price Adjustment Tier' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__BUNDLEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Bundle Based Adjustment' LIMIT 1
                api: rest

  # Badger Deploy Full Tasks

  deploy_mfg_core_assets:
    description: >
      Deploy Manufacturing brand assets, product/part/chemical images, Babylon.js 3D libraries,
      and Industries/IndustriesManufacturing platform settings. Must deploy before theme_and_fields
      because the BrandingSet references these ContentAssets.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/core_assets

  deploy_mfg_theme_and_fields:
    description: >
      Deploy Manufacturing Lightning Experience theme definition (BrandingSet, LightningExperienceTheme)
      and custom fields on SalesAgreement, SalesAgreementProduct, SalesAgreementProductSchedule,
      Quote, QuoteLineItem, and ServiceContract objects.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/theme_and_fields

  deploy_mfg_core_setup:
    description: >
      Deploy Manufacturing core Apex classes (RLM_MFG_SalesAgreementRLMOrder, RLM_MFG_ServiceContractQuote),
      OpenSObject Aura component, RLM_MFG_RCA permission set, RLM_MFG_scratch permission set group,
      and SalesAgreement settings.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/core_setup

  grant_mfg_ext_credential_access:
    group: Manufacturing
    description: >
      Grant External Credential Principal Access to the RLM_MFG_RCA permission set.
      Salesforce Metadata API does not support externalCredentialPrincipalAccess in
      PermissionSet deploy or retrieve, so this script uses a Tooling API callout to
      locate the named principals for BillingSystemExtCredentials and
      SalesforceContractsExtCredentials, then grants SetupEntityAccess via DML.
      Idempotent: skips principals already granted.
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      path: scripts/apex/grantMfgExternalCredentialAccess.apex

  deploy_mfg_tso_perms:
    description: >
      Deploy Manufacturing production permission set group (MFG). Required when tso=true.
      Deployed separately from core_setup so it can be gated by the tso feature flag.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/tso_perms

  deploy_mfg_flows_and_actions:
    description: >
      Deploy all Manufacturing business process flows and Quick Actions in a single transaction:
      Sales Agreement creation and activation flows, quote-to-contract flows, DRO work order
      creation, Service Contract quoting, and the Quick Actions on Account, Contract, Quote, and
      SalesAgreement that invoke them. Runs after core_setup (SA settings + custom fields + perms)
      with a propagation sleep, so all SA-DML flows validate cleanly. Requires the
      IndustriesManufacturing scratch org feature (orgs/dev-mfg.json).
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/flows_and_actions

  deploy_mfg_pricing_recipe:
    description: >
      Deploy Manufacturing default NGP pricing recipe (NGPDefaultRecipe). Must deploy before
      deploy_mfg_pricing_procedure because the ExpressionSetDefinition references this recipe.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/pricing_setup/pricing_recipe

  deploy_mfg_pricing_procedure:
    description: >
      Deploy Manufacturing default pricing procedure ExpressionSetDefinition
      (MFG_Rev_Mgmt_Default_Pricing_Procedure). Performs find-and-replace to inject live
      PriceAdjustmentSchedule IDs for attribute-based, volume, and bundle adjustments.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/pricing_setup/pricing_procedure
      transforms:
        - transform: find_replace
          options:
            patterns:
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__ATTRIBUTEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Attribute Based Adjustment' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__VOLUMEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Price Adjustment Tier' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__BUNDLEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Bundle Based Adjustment' LIMIT 1
                api: rest

  # Manufacturing Document Generation Tasks

  deploy_mfg_omni_datatransforms:
    description: >
      Deploy Manufacturing OmniDataTransforms for document generation (Quote/Contract extraction,
      field mapping, and template name extraction used by the doc gen OmniScript).
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/docgen/omniDataTransforms

  deploy_mfg_omni_integration_procedures:
    description: >
      Deploy Manufacturing OmniIntegrationProcedure for document generation orchestration
      (doc_Generation_Procedure). Must deploy after OmniDataTransforms.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/docgen/omniIntegrationProcedures

  deploy_mfg_omni_base_docgen_script:
    description: >
      Deploy Manufacturing base document generation OmniScript (doc_GenerationCore_English).
      Orchestrates the core document generation flow for proposals and contracts.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/docgen/base_docgen_omniscript/omniScripts

  deploy_mfg_omni_quote_script:
    description: >
      Deploy Manufacturing Quote Proposal OmniScript (doc_QuoteProposal_English).
      Provides the user-facing UI for generating quote proposal documents.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/docgen/quote_omniscript/omniScripts

  deploy_mfg_doc_templates:
    description: >
      Deploy Manufacturing document templates (Badger_Proposal and Price_Contract).
      Must deploy after OmniScripts that reference these templates.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/docgen/documentTemplates

  # Manufacturing Guided Selling

  deploy_mfg_guided_selling:
    description: >
      Deploy Manufacturing Guided Selling metadata: AssessmentQuestions for chemicals and
      power management, Guided Selling OmniScripts, and ProductDiscovery settings.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/guided_selling

  # Manufacturing Rebates

  deploy_mfg_rebates:
    description: >
      Deploy Manufacturing rebate metadata: ObjectHierarchyRelationship settings for
      Opportunity, Quote, SalesAgreement, and TransactionJournal, plus the
      Aggregate_by_Member_Rebates BatchCalcJobDefinition.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/rebates

  # Manufacturing Advanced Account Forecasting

  deploy_mfg_aaf_fields:
    description: >
      Deploy Manufacturing Advanced Account Forecasting object extensions: custom fields on
      AdvAccountForecastFact and en_US ObjectTranslation for AdvAcctForecastSetPartner.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/aaf/fields

  deploy_mfg_aaf_permissions:
    description: >
      Deploy Manufacturing Advanced Account Forecasting permission set (MFG_AAF).
      Must deploy after aaf/fields so the permission set can reference the custom fields.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/aaf/permissions

  deploy_mfg_aaf_dim_source:
    description: >
      Deploy Manufacturing Advanced Account Forecasting dimension source (Category).
      Defines the Category dimension used by the forecast set configuration.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/aaf/dim_source

  deploy_mfg_aaf_forecast_set:
    description: >
      Deploy Manufacturing Advanced Account Forecasting forecast set (CategoryForecastSet).
      Must deploy after dim_source because the forecast set references the Category dimension.
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Manufacturing
    options:
      path: unpackaged/post_manufacturing/aaf/forecast_set
  
  deploy_full:
    description: Deploy all metadata
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Revenue Lifecycle Management
    options:
      path: force-app/main/default
      transforms:
        - transform: find_replace
          options:
            patterns:
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__ATTRIBUTEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Attribute Based Adjustment' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__VOLUMEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Price Adjustment Tier' LIMIT 1
                api: rest
              - xpath: //ExpressionSetDefinition/versions/variables/value[text()="__BUNDLEPasID__"]
                replace_record_id_query: SELECT Id from PriceAdjustmentSchedule WHERE name = 'Standard Bundle Based Adjustment' LIMIT 1
                api: rest

  deploy_org_settings:
    description: Deploy Org Settings
    class_path: cumulusci.tasks.salesforce.Deploy
    group: Revenue Lifecycle Management
    options:
      path: force-app/main/default/settings

  patch_network_email_for_deploy:
    group: Partner Relationship Management
    description: >
      Replace the placeholder emailSenderAddress in rlm.network-meta.xml with the
      Network's actual current EmailSenderAddress (immutable after creation) so
      deploy_post_prm succeeds. Repo stores a non-PII placeholder; run
      revert_network_email_after_deploy after deploy.
    class_path: tasks.rlm_community.PatchNetworkEmailForDeploy

  revert_network_email_after_deploy:
    group: Partner Relationship Management
    description: >
      Restore the placeholder emailSenderAddress in rlm.network-meta.xml after
      deploy_post_prm so the repo never persists the target org's email.
    class_path: tasks.rlm_community.RevertNetworkEmailAfterDeploy

  deploy_post_prm_tso:
    group: Partner Relationship Management
    description: >
      Deploy TSO-only PRM experience overlay containing the View Vouchers page
      (requires Referral and Voucher objects enabled in TSO orgs).
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_prm_tso

  create_partner_central:
    description: Create Partner Central Community
    class_path: cumulusci.tasks.salesforce.CreateCommunity
    options:
      name: "rlm"
      description: "RLM Partner Digital Experience"
      template: "Partner Central (Enhanced)"
      url_path_prefix: "partners"
      skip_existing: true

  create_payments_webhook:
    description: Create Salesforce Payments Webhook
    class_path: cumulusci.tasks.salesforce.CreateCommunity
    options:
      name: "Payments Webhook"
      description: "RLM Salesforce Payments Webhook"
      template: "Build Your Own (LWR)"
      url_path_prefix: "sfpwebhook"
      skip_existing: true

  create_billing_portal:
    group: Revenue Lifecycle Management
    description: Create Self-Service Billing Portal community (Experience Cloud site).
    class_path: cumulusci.tasks.salesforce.CreateCommunity
    options:
      name: "Billing Portal"
      description: "RLM Self-Service Billing Portal"
      template: "Self-Service Billing Portal"
      url_path_prefix: "billing"
      skip_existing: true

  deploy_post_billing_portal:
    group: Revenue Lifecycle Management
    description: Deploy Billing Portal site metadata (experiences, themes, etc.) from unpackaged/post_billing_portal. Run when billing_portal_deploy is true after create_billing_portal.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_billing_portal


#------------------#
# SFDMU DATA TASKS #
#------------------#
# These tasks use the SFDMU (Salesforce Data Move Utility) to load data into the org.
# Each task references a dataset anchor defined earlier, specifying the path to the data to load.
# Data tasks are grouped by feature (QuantumBit, Q3, CLM, etc.) and data type (product, billing, tax, etc.).
# These tasks are essential for seeding orgs with test or reference data during deployment.

  load_sfdmu_data:
    group: Revenue Lifecycle Management
    description: Load SFDMU Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData

  # Manufacturing Load Data Tasks

  insert_test_data:
    group: Manufacturing
    description: Insert Test Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: "datasets/sfdmu/test"

  insert_badger_pcm_data:
    group: Manufacturing
    description: Insert Manufacturing PCM product data (products, product categories, attributes).
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_product_dataset

  insert_badger_pricing_data:
    group: Manufacturing
    description: Insert Manufacturing pricing data (price books, price book entries, price adjustments).
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_pricing_dataset

  insert_badger_dro_data:
    group: Manufacturing
    description: Insert Manufacturing DRO fulfillment decomposition seed data. Assigns dynamic user.
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_dro_dataset
      dynamic_assigned_to_user: true

  insert_badger_guidedselling_data:
    group: Manufacturing
    description: Insert Manufacturing Guided Selling product assignment data.
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_guidedselling_dataset

  insert_badger_rebates_data:
    group: Manufacturing
    description: Insert Manufacturing rebates seed data.
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_rebates_dataset

  insert_badger_aaf_data:
    group: Manufacturing
    description: >
      Load Manufacturing Advanced Account Forecast data. Syncs Period, Product2, and ProductCategory
      IDs from the target org, injects PeriodId, ProductId, and CategoryId into
      AdvAccountForecastFact before SFDMU run.
    class_path: tasks.rlm_aaf_load.LoadAAFData
    options:
      pathtoexportjson: *badger_aaf_dataset

  delete_badger_aaf_data:
    group: Manufacturing
    description: >
      Delete all Insert-operation records from the mfg-aaf plan (AdvAccountForecastFact,
      AdvAcctForecastSetPartner) in reverse plan order. Run before insert_badger_aaf_data for a fresh reload.
    class_path: tasks.rlm_sfdmu.DeleteSFDMUData
    options:
      pathtoexportjson: *badger_aaf_dataset

  insert_quantumbit_pcm_data:
    group: Revenue Lifecycle Management
    description: Insert QuantumBit Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_product_dataset

  insert_quantumbit_pricing_data:
    group: Revenue Lifecycle Management
    description: Insert QuantumBit Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_pricing_dataset

  insert_quantumbit_product_image_data:
    group: Revenue Lifecycle Management
    description: Insert QuantumBit Product Image Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_product_image_dataset

  insert_q3_data:
    group: Revenue Lifecycle Management
    description: Insert Q3 Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *q3_product_dataset

  insert_quantumbit_prm_data:
    group: Revenue Lifecycle Management
    description: >
      Insert QuantumBit PRM data using a 2-pass SFDMU plan. Pass 1 upserts partner
      Accounts, ChannelProgram, and ChannelProgramLevel. Pass 2 enables IsPartner on
      Accounts (not createable, only updateable) and upserts ChannelProgramMember
      linking partners to program levels.
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_prm_dataset

  insert_clm_data:
    group: Revenue Lifecycle Management
    description: Insert CLM Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_clm_dataset

  insert_clm_data_prod:
    group: Revenue Lifecycle Management
    description: Insert CLM Data to Production
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_clm_dataset

  insert_qb_dro_data:
    group: Revenue Lifecycle Management
    description: Insert QuantumBit DRO Data (scratch and prod; AssignedTo resolved from target org)
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_dro_dataset
      dynamic_assigned_to_user: true

  update_product_fulfillment_decomp_rules:
    group: Revenue Lifecycle Management
    description: Update ProductFulfillmentDecompRule after DRO load. TEMPORARY FIX (260 bug) ExecuteOnRuleId not created on INSERT; re-save triggers ruleset generation. See scripts/apex/updateProductFulfillmentDecompRules.apex.
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      path: scripts/apex/updateProductFulfillmentDecompRules.apex

  insert_q3_dro_data_scratch:
    group: Revenue Lifecycle Management
    description: Insert Q3 DRO Data to Scratch
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *q3_dro_dataset
      dynamic_assigned_to_user: true

  insert_q3_dro_data_prod:
    group: Revenue Lifecycle Management
    description: Insert Q3 DRO Data to Production
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *q3_dro_dataset
      dynamic_assigned_to_user: true

  insert_tax_data:
    group: Revenue Lifecycle Management
    description: Insert QuantumBit Tax Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_tax_dataset


  insert_q3_tax_data:
    group: Revenue Lifecycle Management
    description: Insert Q3 Tax Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *q3_tax_dataset


  insert_billing_data:
    group: Revenue Lifecycle Management
    description: Insert QuantumBit Billing Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *quantumbit_billing_dataset


  insert_q3_billing_data:
    group: Revenue Lifecycle Management
    description: Insert Q3 Billing Data
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *q3_billing_dataset

  insert_mfg_billing_data:
    group: Manufacturing
    description: >
      Insert Manufacturing billing seed data (BillingTreatment, BillingPolicy, PaymentTerm,
      LegalEntity, AccountingPeriod, GeneralLedgerAccount, GeneralLedgerAcctAsgntRule) and
      assign BillingPolicy to all MFG products. Required for order activation on badger orgs
      when billing=true. Source: datasets/sfdmu/mfg/en-US/mfg-billing.
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_billing_dataset


  insert_mfg_tax_data:
    group: Manufacturing
    description: >
      Insert Manufacturing tax seed data (TaxPolicy, TaxTreatment, Product2 TaxPolicy assignments).
      Activates TaxPolicy and TaxTreatment via a two-pass SFDMU plan. Required for order activation
      on badger orgs when tax=true. Source: datasets/sfdmu/mfg/en-US/mfg-tax.
    class_path: tasks.rlm_sfdmu.LoadSFDMUData
    options:
      pathtoexportjson: *badger_tax_dataset

  deploy_mfg_visualization:
    group: Manufacturing
    description: >
      Deploy Manufacturing 3D Visualization metadata (LWC renderDraw3DConfigurationPrototype,
      RenderDraw_Product_Configurator_Flow, X3DVisualization VF page, RenderDraw_SRC CSP Trusted Site).
      Required when mfg_visuals=true. Source: unpackaged/post_manufacturing_visualization.
    class_path: cumulusci.tasks.salesforce.Deploy
    options:
      path: unpackaged/post_manufacturing_visualization

  insert_mfg_configflow_data:
    group: Manufacturing
    description: >
      Insert Manufacturing product configuration flow assignments
      (ProductConfigurationFlow, ProductConfigFlowAssignment). Maps MFG products to their
