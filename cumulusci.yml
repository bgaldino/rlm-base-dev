#--------------------#
# DATA MAINTENANCE    #
#--------------------#
# Delete / reset data plan records in dependency order. Use before re-running
# a data plan to avoid duplicates (e.g. before test_*_idempotency). Add tasks
# here for each plan that has a delete script (rates, rating, billing, etc.).

  # Badger Delete Tasks
  delete_badger_pricing_data:
    group: Data Maintenance
    description: >
      Delete all Insert-operation records from the qb-pricing plan (PricebookEntryDerivedPrice,
      PricebookEntry, BundleBasedAdjustment, AttributeBasedAdjustment,
      AttributeAdjustmentCondition, PriceAdjustmentTier)
      in reverse plan order (children first). Shape-agnostic: clears all records of
      each type regardless of which data shape populated them. Run before
      insert_quantumbit_pricing_data when layering multiple pricing shapes.
      Note: CostBookEntry is currently excluded (empty CSV) and will not be deleted.
    class_path: tasks.rlm_sfdmu.DeleteSFDMUData
    options:
      pathtoexportjson: *badger_pricing_dataset

  delete_quantumbit_pricing_data:
    group: Data Maintenance
    description: >
      Delete all Insert-operation records from the qb-pricing plan (PricebookEntryDerivedPrice,
      PricebookEntry, BundleBasedAdjustment, AttributeBasedAdjustment,
      AttributeAdjustmentCondition, PriceAdjustmentTier)
      in reverse plan order (children first). Shape-agnostic: clears all records of
      each type regardless of which data shape populated them. Run before
      insert_quantumbit_pricing_data when layering multiple pricing shapes.
      Note: CostBookEntry is currently excluded (empty CSV) and will not be deleted.
    class_path: tasks.rlm_sfdmu.DeleteSFDMUData
    options:
      pathtoexportjson: *quantumbit_pricing_dataset

  delete_qb_rates_data:
    group: Data Maintenance
    description: Delete all qb-rates data (RateAdjustmentByTier, RateCardEntry, PriceBookRateCard, RateCard) in dependency order. Use before re-running insert_qb_rates_data or test_qb_rates_idempotency to clear duplicates.
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      path: scripts/apex/deleteQbRatesData.apex

  delete_qb_rating_data:
    group: Data Maintenance
    description: Delete all qb-rating data (PUG, PURP, PUR, RatingFrequencyPolicy, UsageGrantRolloverPolicy, etc.) in dependency order. Use before re-running insert_qb_rating_data to clear duplicates.
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      path: scripts/apex/deleteQbRatingData.apex

  delete_draft_billing_records:
    group: Data Maintenance
    description: Delete all draft billing-related records (BillingTreatmentItem, BillingTreatment, BillingPolicy, PaymentTermItem, PaymentTerm) in dependency order. Use before re-running the billing data plan to avoid duplicates.
    class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
    options:
      path: scripts/apex/deleteDraftBillingRecords.apex


#--------------------#
# EXTRACTION TASKS   #
#--------------------#
# Extract tasks for each QB plan are under the Data Management - Extract group (extract_qb_*_data).
# Post-process script makes extracted CSVs re-import-ready (composite keys, header normalization).

  post_process_extraction:
    group: Revenue Lifecycle Management
    description: Post-process extracted CSVs into import-ready format
    class_path: cumulusci.tasks.command.Command
    options:
      command: "python3 scripts/post_process_extraction.py {extraction_dir} {plan_dir}"

