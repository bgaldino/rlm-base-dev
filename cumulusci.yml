# Project configuration settings
# Defines the project name, package details, and source format
project:
  name: rlm-base
  package:
    name: rlm-base
    api_version: "67.0"
  git:
    default_branch: "main"
  source_format: sfdx

#------------------#
# CUSTOM SETTINGS  #
#------------------#
# Feature flags and configuration options used throughout the deployment process.
# Toggle any flag on/off to conditionally enable or disable specific tasks and flows.

  custom:

    # ── Org Type & Mode ────────────────────────────────────────────────────────
    qbrix: false              # Use xDO base layer (disable for orgs without xDO licenses)
    tso: false                # Trialforce Source Org (set true when targeting a TSO scratch org)
    pde: false                # Partner Development Environment (DE, no qbrix or custom UX)
    trial: false              # Public Trial org (EE, no qbrix or custom UX)
    dev_ed: false             # Developer Edition org — set true for non-standard dev orgs to suppress Enterprise-only PS assignments
    refresh: false            # Data refresh mode — skips insert steps during re-runs

    # ── Core Revenue Cloud Features ────────────────────────────────────────────
    billing: true             # Billing
    billing_ui: true          # Billing UI LWC components (post_billing_ui)
    billing_portal: false     # Self-Service Billing Portal community
    billing_portal_deploy: true  # Deploy post_billing_portal site content (requires billing_portal)
    payments: true            # Payments
    approvals: true           # Approvals
    tax: true                 # Tax engine
    calmdelete: true          # CALM Delete
    large_stx: true          # Large Sales Transaction

    # ── Revenue Orchestration ──────────────────────────────────────────────────
    dro: true                 # Dynamic Revenue Orchestration
    rating: true              # Rating design-time data
    rates: true               # Rates
    ramps: true               # Ramps

    # ── Contracts & CLM ────────────────────────────────────────────────────────
    clm: true                 # Contract Lifecycle Management
    clm_data: false           # CLM sample data

    # ── Partner & Commerce ─────────────────────────────────────────────────────
    prm: true                 # Partner Relationship Management
    prm_exp_bundle: false      # PRM Experience Bundle (post_prm site content)
    commerce: false           # Commerce

    # ── AI & Analytics ─────────────────────────────────────────────────────────
    einstein: true            # Einstein AI
    agents: false             # Agentforce agent configurations
    analytics: true           # Enable CRM Analytics (262+: InsightsSetupSettings VF page removed; full CRM Analytics enablement now required via Getting Started page)

    # ── Configurators & Tooling ────────────────────────────────────────────────
    docgen: true              # Document Generation
    constraints: true         # Constraint Builder
    constraints_data: true    # Constraint Builder sample data
    breconfig: false          # Business Rules Engine configuration
    guidedselling: false      # Guided Selling
    procedureplans: true      # Procedure Plans

    # ── Data & UX ──────────────────────────────────────────────────────────────
    qb: true                  # QuantumBit data
    q3: false                 # Q3 data
    quantumbit: true          # QuantumBit app deployment
    product_dataset: qb       # Default product dataset
    ux: true                  # Assemble and deploy dynamic UX (set false to skip prepare_ux entirely)
    sample_data: true         # Sample data

    # ── Deployment Options ─────────────────────────────────────────────────────
    personas: true            # Persona profiles and permission set groups (post_personas)
    locale: en_US             # Default locale

