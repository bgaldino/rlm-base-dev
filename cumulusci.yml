        when: project_config.project__custom__analytics

  prepare_payments:
    group: Revenue Lifecycle Management
    steps:
      1:
        task: create_payments_webhook
        when: project_config.project__custom__payments
      2:
        task: patch_payments_site_for_deploy
        when: project_config.project__custom__payments
      3:
        task: deploy_post_payments_site
        when: project_config.project__custom__payments
      4:
        task: revert_payments_site_after_deploy
        when: project_config.project__custom__payments
      5:
        task: publish_community
        when: project_config.project__custom__payments
        options:
          name: Payments Webhook
      6:
        task: deploy_post_payments_settings
        when: project_config.project__custom__payments

  prepare_revenue_settings:
    group: Revenue Lifecycle Management
    steps:
      1:
        task: configure_revenue_settings
        when: "not (project_config.project__custom__quantumbit or project_config.project__custom__tso)"
      2:
        task: configure_revenue_settings
        when: "project_config.project__custom__quantumbit or project_config.project__custom__tso"
        options:
          manage_assets_flow: RLM_ARC_Assets
      3:
        task: configure_core_pricing_setup

  prepare_pricing_discovery:
    group: Revenue Lifecycle Management
    steps:
      1:
        task: reconfigure_pricing_discovery
      2:
        task: configure_product_discovery_settings
        when: project_config.project__custom__qb

## Manufacturing Sub-flows

  prepare_mfg_perms:
    group: Manufacturing
    description: >
      Assign Manufacturing permission sets and permission set groups to the running user.
      Waits for metadata deployment to settle before assigning. Assigns either the scratch
      PSG (non-TSO) or production PSG (TSO) based on the tso feature flag. Also grants
      External Credential Principal Access to RLM_MFG_RCA (Metadata API limitation
      workaround via Tooling API callout + SetupEntityAccess DML).
    steps:
      1:
        task: util_sleep
        when: project_config.project__custom__badger
        options:
          seconds: *sleep_default
      2:
        task: assign_permission_sets
        when: project_config.project__custom__badger
        options:
          api_names: *badger_mfg_ps
      3:
        task: assign_permission_set_groups
        when: project_config.project__custom__badger and not project__custom__tso
        options:
          api_names: *badger_mfg_scratch_psg
      4:
        task: assign_permission_set_groups
        when: project_config.project__custom__badger and project__custom__tso
        options:
          api_names: *badger_mfg_psg
      5:
        task: grant_mfg_ext_credential_access
        when: project_config.project__custom__badger

  prepare_mfg_docgen:
    group: Manufacturing
    description: >
      Deploy Manufacturing OmniStudio document generation components in dependency order:
      OmniDataTransforms, OmniIntegrationProcedure, base doc gen OmniScript, Quote Proposal
      OmniScript, and document templates (Badger_Proposal, Price_Contract).
    steps:
      1:
        task: deploy_mfg_omni_datatransforms
        when: project_config.project__custom__badger
      2:
        task: deploy_mfg_omni_integration_procedures
        when: project_config.project__custom__badger
      3:
        task: deploy_mfg_omni_base_docgen_script
        when: project_config.project__custom__badger
      4:
        task: deploy_mfg_omni_quote_script
        when: project_config.project__custom__badger
      5:
        task: deploy_mfg_doc_templates
        when: project_config.project__custom__badger

  prepare_mfg_data:
    group: Manufacturing
    description: >
      Load all Manufacturing seed data: PCM products, pricing records, DRO fulfillment rules,
      CML constraint models (GeneratorSet, FuelCell), and conditionally tax and billing records.
    steps:
      1:
        task: insert_badger_pcm_data
        when: project_config.project__custom__badger
      2:
        task: insert_badger_pricing_data
        when: project_config.project__custom__badger
      3:
        task: insert_badger_dro_data
        when: project_config.project__custom__badger
      4:
        flow: import_mfg_cml
        when: project_config.project__custom__badger
      5:
        flow: prepare_mfg_tax
        when: project_config.project__custom__badger and project_config.project__custom__tax
      6:
        flow: prepare_mfg_billing
        when: project_config.project__custom__badger and project_config.project__custom__billing

  prepare_mfg_billing:
    group: Manufacturing
    description: >
      Load and activate Manufacturing billing seed data (LegalEntity, AccountingPeriod,
      BillingPolicy, BillingTreatment, BillingTreatmentItem, GeneralLedgerAccount,
      GeneralLedgerAcctAsgntRule, Product2 billing policy assignments). Activates billing
      records and deploys billing metadata. Runs when badger=true and billing=true.
    steps:
      1:
        task: insert_mfg_billing_data
        when: project_config.project__custom__billing
      2:
        task: activate_flow
        when: project_config.project__custom__billing
        options:
          developer_names: RLM_Order_to_Billing_Schedule_Flow
      3:
        task: activate_default_payment_term
        when: project_config.project__custom__billing
      4:
        task: activate_billing_records
        when: project_config.project__custom__billing
      5:
        task: deploy_post_billing
        when: project_config.project__custom__billing
      6:
        task: deploy_billing_template_settings
        when: project_config.project__custom__billing

  prepare_mfg_tax:
    group: Manufacturing
    description: >
      Load and activate Manufacturing tax seed data (LegalEntity, TaxPolicy, TaxTreatment,
      Product2 TaxPolicy assignments). Uses a two-pass SFDMU plan: Pass 1 inserts records in
      Draft status; Pass 2 activates TaxTreatment and TaxPolicy and sets DefaultTaxTreatmentId.
      Runs when badger=true and tax=true.
    steps:
      1:
        task: insert_mfg_tax_data
        when: project_config.project__custom__tax
      2:
        task: activate_tax_records
        when: project_config.project__custom__tax

  prepare_mfg_context_plan:
    group: Manufacturing
    description: >
      Extend and apply the Manufacturing Sales Transaction context definition. Runs
      extend_context_sales_transaction_mfg then applies the MFG SalesTransactionContext twice
      (two-pass pattern required for full attribute population).
    steps:
      1:
        task: extend_context_sales_transaction_mfg
        when: project_config.project__custom__badger
      2:
        task: apply_mfg_SalesTransactionContext
        when: project_config.project__custom__badger
      3:
        task: apply_mfg_SalesTransactionContext
        when: project_config.project__custom__badger

  prepare_mfg_pricing:
    group: Manufacturing
    description: >
      Deploy Manufacturing pricing metadata and activate the pricing procedure. Deploys the
      NGP default pricing recipe, then the MFG_Rev_Mgmt_Default_Pricing_Procedure ExpressionSetDefinition
      (with live PriceAdjustmentSchedule ID injection), then activates version V1.
    steps:
      1:
        task: deploy_mfg_pricing_recipe
        when: project_config.project__custom__badger
      2:
        task: deploy_mfg_pricing_procedure
        when: project_config.project__custom__badger
      3:
        task: manage_expression_sets
        when: project_config.project__custom__badger
        options:
          operation: activate_versions
          version_full_names: "MFG_Rev_Mgmt_Default_Pricing_Procedure_V1"

  import_mfg_cml:
    group: Manufacturing
    steps:
      1:
        task: import_cml
        when: project_config.project__custom__badger
        options:
          data_dir: *genSet_mfg_cml
      2:
        task: import_cml
        when: project_config.project__custom__badger
        options:
          data_dir: *fuelCell_mfg_cml
      3:
        task: manage_expression_sets
        when: project_config.project__custom__badger
        options:
          operation: activate_versions
          version_full_names: "GeneratorSet_V1,Fuel_Cell_V1"

  prepare_mfg_dro:
    group: Manufacturing
    description: >
      Load Manufacturing DRO seed data and update product fulfillment decomposition rules.
      Standalone flow; DRO steps are also embedded in prepare_mfg_data and prepare_manufacturing.
    steps:
      1:
        task: insert_badger_dro_data
        when: project_config.project__custom__badger
      2:
        task: update_product_fulfillment_decomp_rules
        when: project_config.project__custom__badger

  prepare_mfg_guided_selling:
    group: Manufacturing
    description: >
      Deploy Manufacturing Guided Selling metadata and load seed data. Deploys AssessmentQuestions,
      OmniScripts, and ProductDiscovery settings, then inserts guided selling product assignments.
      Gated by badger=true and mfg_guidedselling=true.
    steps:
      1:
        task: insert_badger_guidedselling_data
        when: project_config.project__custom__badger and project_config.project__custom__mfg_guidedselling
      2:
        task: deploy_mfg_guided_selling
        when: project_config.project__custom__badger and project_config.project__custom__mfg_guidedselling

  prepare_mfg_rebates:
    group: Manufacturing
    description: >
      Deploy Manufacturing rebate metadata (ObjectHierarchyRelationship settings and
      BatchCalcJobDefinition) then load rebate seed data.
      Gated by badger=true and mfg_rebates=true.
    steps:
      1:
        task: deploy_mfg_rebates
        when: project_config.project__custom__badger and project_config.project__custom__mfg_rebates
      2:
        task: insert_badger_rebates_data
        when: project_config.project__custom__badger and project_config.project__custom__mfg_rebates

  prepare_mfg_aaf:
    group: Manufacturing
    description: >
      Deploy Manufacturing Advanced Account Forecasting metadata in dependency order: object fields
      and translations, permission set, then waits before deploying the dimension source and forecast
      set configuration. Loads AAF seed data last. Gated by badger=true and mfg_aaf=true.
    steps:
      1:
        task: deploy_mfg_aaf_fields
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf
      2:
        task: deploy_mfg_aaf_permissions
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf
      3:
        task: assign_permission_sets
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf
        options:
          api_names: *badger_aaf_ps
      4:
        task: util_sleep
        options:
          seconds: *sleep_default
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf
      5:
        task: deploy_mfg_aaf_dim_source
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf
      6:
        task: deploy_mfg_aaf_forecast_set
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf
      7:
        task: insert_badger_aaf_data
        when: project_config.project__custom__badger and project_config.project__custom__mfg_aaf

  prepare_ramp_builder:
    group: Revenue Lifecycle Management
    description: >
      Deploy Create Ramp Schedule V4 feature into the target org. Deploys QuoteLineGroup custom
      fields, Lightning Message Channel, all Apex classes, six LWC bundles, the
      RLM_Create_Ramp_Schedule_V4 screen flow, and the Quote quick action in dependency order.
      Adds RampMode__c/GroupRampMode__c context attributes to the Sales Transaction context
      definition mapped to QuoteLineItem, QuoteLineGroup, OrderItem, and OrderItemGroup.
      After this flow runs, add the "Create Ramp Schedule" action to the Quote page layout
      (or Dynamic Actions highlights panel) and ensure the flow is Active in Setup.
    steps:
      1:
        task: deploy_post_ramp_builder
        when: project_config.project__custom__ramps
      2:
        task: apply_context_ramp_mode
        when: project_config.project__custom__ramps
      3:
        task: assign_permission_sets
        when: project_config.project__custom__ramps
        options:
          api_names: *ps_ramp_builder

  prepare_ux:
    group: UX Personalization
    description: >
      Assemble and deploy all project UX personalization metadata (flexipages, layouts,
      applications, app menus, profiles) from feature-conditional templates. Runs at
      step 29 of prepare_rlm_org, after all feature provisioning is complete, ensuring
      all referenced objects, fields, and components exist before UX metadata is deployed.
      Step 2 reorders the App Launcher via browser automation — required on Trialforce
      orgs where the Metadata API AppSwitcher deploy is blocked by managed ConnectedApps.
    steps:
      1:
        task: assemble_and_deploy_ux
        when: project_config.project__custom__ux
      2:
        task: reorder_app_launcher
        when: project_config.project__custom__ux

  prepare_mfg_ux:
    group: Manufacturing
    description: >
      Assemble and deploy Manufacturing UX metadata (flexipages, layouts, applications)
      from templates/flexipages/standalone/manufacturing/, templates/layouts/manufacturing/,
      and templates/applications/manufacturing/. Output is written to
      unpackaged/post_manufacturing_ux/ and deployed in a single sf project deploy start call.
      Passes manufacturing=true so that manufacturing-specific content (SalesAgreement pages,
      RLM_MFG_* flexipages, manufacturing RLM_Revenue_Cloud variant) is included.
      Must run after all manufacturing metadata is deployed (step 14 of prepare_manufacturing).
      Run this flow independently to test manufacturing UX assembly without running the full
      prepare_rlm_org flow. Gated by badger=true and ux=true in prepare_manufacturing.
    steps:
      1:
        task: assemble_and_deploy_ux
        when: project_config.project__custom__badger and project_config.project__custom__ux
        options:
          output_path: unpackaged/post_manufacturing_ux
          manufacturing: true

  prepare_personas:
    group: Revenue Lifecycle Management
    description: Deploy persona metadata (profiles, permission set groups, permission sets) from unpackaged/post_personas. Not wired into prepare_rlm_org.
    steps:
      1:
        task: deploy_post_personas

  run_qb_extracts:
    group: Data Management - Extract
    description: Run all QB data extract tasks (org → CSV). Use --org to specify source org.
    steps:
      1:
        task: extract_qb_pcm_data
      2:
        task: extract_qb_pricing_data
      3:
        task: extract_qb_product_images_data
      4:
        task: extract_qb_dro_data
      5:
        task: extract_qb_clm_data
      6:
        task: extract_qb_rating_data
      7:
        task: extract_qb_rates_data
      8:
        task: extract_qb_transactionprocessingtypes_data
      9:
        task: extract_qb_guidedselling_data

  extract_mfg_aaf_with_category_fix:
    group: Data Management - Extract
    description: >
      Extract mfg-aaf from org, then fix Category__r.Code (SFDMU v5 workaround).
      Equivalent to extract_mfg_aaf_data followed by fix_mfg_aaf_category_extraction.
    steps:
      1:
        task: extract_mfg_aaf_data
      2:
        task: fix_mfg_aaf_category_extraction

  run_qb_idempotency_tests:
    group: Data Management - Idempotency
    description: Run all QB data idempotency tests (load twice, assert no new records). Use --org to specify target org.
    steps:
      1:
        task: test_qb_pcm_idempotency
      2:
        task: test_qb_pricing_idempotency
      3:
        task: test_qb_product_images_idempotency
      4:
        task: test_qb_dro_idempotency
      5:
        task: test_qb_clm_idempotency
      6:
        task: test_qb_rating_idempotency
      7:
        task: test_qb_rates_idempotency
      8:
        task: test_qb_transactionprocessingtypes_idempotency
      9:
        task: test_qb_guidedselling_idempotency

  prepare_mfg_visuals:
    group: Manufacturing
    description: >
      Deploy Manufacturing 3D Visualization metadata and load product configuration flow
      assignments. Step 1 deploys unpackaged/post_manufacturing_visualization (LWC, VF page,
      CSP Trusted Site, RenderDraw flow). Step 2 inserts ProductConfigurationFlow and
      ProductConfigFlowAssignment records from datasets/sfdmu/mfg/en-US/mfg-configflow.
      Gated by mfg_visuals=true. Run independently to test visualization deployment
      before adding to prepare_manufacturing.
    steps:
      1:
        task: deploy_mfg_visualization
        when: project_config.project__custom__mfg_visuals
      2:
        task: insert_mfg_configflow_data
        when: project_config.project__custom__mfg_visuals
