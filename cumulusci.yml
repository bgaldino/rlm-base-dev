    group: Revenue Lifecycle Management
    description: Post-process extracted CSVs into import-ready format
    class_path: cumulusci.tasks.command.Command
    options:
      command: "python3 scripts/post_process_extraction.py datasets/sfdmu/extractions/mfg-pcm/2026-03-05T165417 datasets/sfdmu/mfg/en-US/mfg-pcm"

