# Quantity spread — varied deal sizes for realistic invoice amounts.
#
#   python -m scripts.txn_data_harness.generate --org <sf-alias> \
#       --config scripts/txn_data_harness/scenarios/sales_txn_quote/09-quantity-spread.yaml --concurrency 3
#
# Same product, different quantities per spec, so the resulting invoices span a
# range of amounts (small / medium / large deals) rather than a single value —
# better-looking revenue charts and aggregation demos.
defaults:
  kind: sales_txn_quote        # PST chain to Posted invoice
  account: "Infinitech"
  target_stage: invoice_posted

scenarios:
  - products:
      - sku: "QB-API-FLEX"
        quantity: 1               # small deals
    count: 20

  - products:
      - sku: "QB-API-FLEX"
        quantity: 10              # medium deals
    count: 10

  - products:
      - sku: "QB-API-FLEX"
        quantity: 100             # large deals
    count: 5
