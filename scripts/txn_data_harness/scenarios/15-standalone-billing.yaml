# Standalone billing — unsupported Posted-invoice ingest example.
#
# DO NOT RUN as an operator scenario today. The parser intentionally rejects
# `target_stage: invoice_posted` for `kind: invoice_ingestion` until the InvoiceLineTax
# graph payload lands and is live-verified. Use
# 15-standalone-billing-draft.yaml for the supported Draft path.
#
# Bypasses the PST chain entirely: no Opportunity, no Quote, no Order, no
# Activate, no BillingSchedule. Each transaction is a single POST to
# /commerce/invoicing/.../actions/ingest that creates a Posted invoice plus
# its lines in one composite-graph call. `Invoice.CreationMode = External` is
# the contractual marker; PST-emitted invoices stay `Salesforce`.
#
# Posted ingested invoices are NOT deletable -- same constraint as the PST
# Posted path. This file is retained as a non-operator reference only.
#
# Tax dependency: taxable TaxTreatment rows require InvoiceLineTax records.
# InvoiceLineTax payload design is tracked in docs/followups.md.
#
# Account flavors verified against this scenario:
#   - Infinitech    (billing-ready; has a BillingAccount row)
#   - Global Media  (pipeline-only; no BillingAccount -- ingestion uses
#                    Account.Id directly so this works natively)
defaults:
  kind: invoice_ingestion        # standalone-billing path
  target_stage: invoice_posted
  invoice:
    should_calculate_tax: false
    # Posted invoices REJECT taxCalculationStatus = Pending / Estimated
    # (verified live 2026-06-25 on rlm-base__jun17_1: the ingest API returns
    # "You can't specify a posted invoice with the taxCalculationStatus as
    # estimated. Specify posted as the taxCalculationStatus."). The harness
    # defaults Posted scenarios to "Posted" automatically; we set it
    # explicitly here so the YAML is self-documenting.
    tax_calculation_status: Posted

scenarios:
  - account: "Infinitech"
    count: 3
    invoice_lines:
      - name: API Flex
        sku: QB-API-FLEX
        quantity: 10
        unit_price: 25
        taxable: false

  - account: "Global Media"
    count: 2
    invoice_lines:
      - name: API Flex
        sku: QB-API-FLEX
        quantity: 5
        unit_price: 100
        taxable: false
