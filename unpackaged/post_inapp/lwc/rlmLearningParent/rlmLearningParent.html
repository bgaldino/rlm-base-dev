<template>
  <lightning-layout multiple-rows="true">
    <lightning-layout-item class="slds-var-p-top_small" size="12">
      <lightning-layout>
        <lightning-layout-item class="slds-var-p-right_small" size="8">
          <template if:false={hasNoData}>
            <div class="slds-var-p-bottom_large">
              <c-rlm-learning-release-note onhasnodata={handleHasNoData}></c-rlm-learning-release-note>
            </div>
          </template>
          <c-rlm-learning-app-container></c-rlm-learning-app-container>
        </lightning-layout-item>
        <lightning-layout-item class="slds-var-p-left_small" size="4">
          <c-rlm-learning-right-container is-home={isHome}></c-rlm-learning-right-container>
        </lightning-layout-item>
      </lightning-layout>
    </lightning-layout-item>
  </lightning-layout>
</template>
