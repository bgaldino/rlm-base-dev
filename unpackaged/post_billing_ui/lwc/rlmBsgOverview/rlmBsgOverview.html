<template>
    <lightning-card>
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                variant="border-filled"
                size="small"
                onclick={handleRefresh}>
            </lightning-button-icon>
        </div>
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <template if:true={error}>
                <div class="slds-text-color_error slds-p-around_medium">{error}</div>
            </template>

            <template if:true={hasData}>

                <!-- Summary Cards -->
                <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_large">
                    <div class="slds-col slds-size_1-of-4">
                        <div class="summary-card">
                            <div class="summary-icon">
                                <lightning-icon icon-name="utility:currency" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <div class="summary-content">
                                <div class="summary-label">Total Billed</div>
                                <div class="summary-value">{formattedTotalBilled}</div>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-4">
                        <div class="summary-card">
                            <div class="summary-icon warning">
                                <lightning-icon icon-name="utility:clock" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <div class="summary-content">
                                <div class="summary-label">Total Pending</div>
                                <div class="summary-value">{formattedTotalPending}</div>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-4">
                        <div class="summary-card">
                            <div class="summary-icon info">
                                <lightning-icon icon-name="utility:number_input" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <div class="summary-content">
                                <div class="summary-label">Net Quantity</div>
                                <div class="summary-value">{netQuantity}</div>
                            </div>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-4">
                        <div class="summary-card">
                            <div class="summary-icon success">
                                <lightning-icon icon-name="utility:trending" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <div class="summary-content">
                                <div class="summary-label">Billing Completion</div>
                                <div class="summary-value">{billingCompletionPercentage}</div>
                            </div>
                        </div>
                    </div>
                </div>

            </template>
        </div>
    </lightning-card>

    <!-- Billing Schedules / Billings by Period -->
    <lightning-card class="slds-m-top_medium">
        <div slot="title">
            <div class="slds-grid slds-grid_vertical-align-center">
                <lightning-icon icon-name="standard:event" size="small" class="slds-m-right_x-small"></lightning-icon>
                <span class="slds-text-heading_small">Consolidated Billing Timeline</span>
            </div>
        </div>

        <div slot="actions">
            <lightning-button-group>
                <lightning-button
                    label="Billings by Period"
                    variant={periodButtonVariant}
                    onclick={showPeriodView}>
                </lightning-button>
                <lightning-button
                    label="Billing Schedules"
                    variant={timelineButtonVariant}
                    onclick={showTimelineView}>
                </lightning-button>
            </lightning-button-group>
        </div>

        <div class="slds-p-around_medium">

            <!-- Timeline (Gantt) View -->
            <template if:true={isTimelineView}>
                <template if:true={hasScheduleData}>
                    <div class="timeline-container">
                        <div class="timeline-header">
                            <div class="name-column-header">Name</div>
                            <div class="timeline-months">
                                <template for:each={monthLabels} for:item="month">
                                    <div key={month.key} class="month-label" style={month.style}>
                                        {month.label}
                                    </div>
                                </template>
                            </div>
                        </div>

                    <div class="timeline-rows-wrapper">
                    <template if:true={hasSuspension}>
                        <div class="suspension-overlay" style={suspensionOverlayStyle}>
                            <span class="suspension-label">Suspended</span>
                        </div>
                    </template>
                    <template if:true={hasBsgEndDate}>
                        <div class="bsg-end-marker-gantt" style={bsgEndDateGanttStyle}>
                            <span class="bsg-end-label">{bsgEndDateLabel}</span>
                        </div>
                    </template>

                    <div class="timeline-rows">
                        <template for:each={ganttSchedules} for:item="schedule">
                                <div key={schedule.id} class="schedule-row" data-schedule-id={schedule.id}>
                                    <div class="name-column">
                                        <div class="schedule-name">
                                            <lightning-button
                                                variant="base"
                                                label={schedule.scheduleNumber}
                                                class="schedule-link"
                                                data-schedule-id={schedule.id}
                                                onclick={handleScheduleClick}>
                                            </lightning-button>
                                        </div>
                                        <div class="schedule-category">
                                            <lightning-badge label={schedule.category} class={schedule.categoryClass}></lightning-badge>
                                            <span class="quantity-label">Qty {schedule.quantity}</span>
                                        </div>
                                    </div>
                                    <div class="timeline-bar-container">
                                        <div class={schedule.barClass} style={schedule.barStyle}>
                                            <span class="bar-amount">{schedule.displayAmount}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div> <!-- /timeline-rows-wrapper -->
                    </div>

                </template>

                <!-- Timeline Legend -->
                <div class="chart-legend slds-m-top_small">
                    <span class="legend-item">
                        <span class="legend-color active-color"></span>
                        <span class="slds-text-body_small">Active</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color billed-color"></span>
                        <span class="slds-text-body_small">Completely Billed</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color planned-color"></span>
                        <span class="slds-text-body_small">Planned</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color cancelled-color"></span>
                        <span class="slds-text-body_small">Cancelled</span>
                    </span>
                    <template if:true={hasSuspension}>
                        <span class="legend-item">
                            <span class="legend-color suspended-color"></span>
                            <span class="slds-text-body_small">Suspended</span>
                        </span>
                    </template>
                </div>

                <!-- Selected BS Detail -->
                <template if:true={selectedSchedule}>
                    <div class="slds-m-top_medium bs-detail-panel">
                        <div class="bs-detail-header">
                            <div class="bs-detail-title-row">
                                <span class="bs-detail-name">{selectedSchedule.scheduleNumber}</span>
                                <span class={selectedSchedule.categoryBadgeClass}>{selectedSchedule.displayCategory}</span>
                                <span class={selectedSchedule.statusBadgeClass}>{selectedSchedule.displayStatus}</span>
                            </div>
                            <lightning-button-icon
                                icon-name="utility:close"
                                variant="bare"
                                alternative-text="Close"
                                onclick={closeScheduleDetails}>
                            </lightning-button-icon>
                        </div>

                        <div class="bs-detail-body">
                            <div class="slds-text-title_caps slds-m-bottom_x-small bs-section-title">Billing Amount Information</div>
                            <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Total Amount</div>
                                    <div class="detail-value">{selectedSchedule.formattedTotalAmount}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Billed Amount</div>
                                    <div class="detail-value">{selectedSchedule.formattedBilledAmount}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Pending Amount</div>
                                    <div class="detail-value">{selectedSchedule.formattedPendingAmount}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Billing Period Amount</div>
                                    <div class="detail-value">{selectedSchedule.formattedBillingPeriodAmount}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                                    <div class="detail-label">Quantity</div>
                                    <div class="detail-value">{selectedSchedule.quantity}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                                    <div class="detail-label">Unit Price</div>
                                    <div class="detail-value">{selectedSchedule.formattedUnitPrice}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                                    <div class="detail-label">Net Unit Price</div>
                                    <div class="detail-value">{selectedSchedule.formattedNetUnitPrice}</div>
                                </div>
                            </div>

                            <div class="slds-text-title_caps slds-m-bottom_x-small bs-section-title">Billing Date Information</div>
                            <div class="slds-grid slds-wrap slds-gutters_small">
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Start Date</div>
                                    <div class="detail-value">{selectedSchedule.formattedStartDate}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">End Date</div>
                                    <div class="detail-value">{selectedSchedule.formattedEndDate}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Next Billing Date</div>
                                    <div class="detail-value">{selectedSchedule.formattedNextBillingDate}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4">
                                    <div class="detail-label">Billing Type</div>
                                    <div class="detail-value">{selectedSchedule.billingType}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                                    <div class="detail-label">Billing Method</div>
                                    <div class="detail-value">{selectedSchedule.billingMethod}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                                    <div class="detail-label">Billing Term</div>
                                    <div class="detail-value">{selectedSchedule.billingTerm}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-4 slds-m-top_small">
                                    <div class="detail-label">Billing Term Unit</div>
                                    <div class="detail-value">{selectedSchedule.billingTermUnit}</div>
                                </div>
                            </div>

                            <div class="slds-m-top_medium">
                                <div class="detail-label slds-m-bottom_x-small">Billed vs Pending</div>
                                <div class="progress-bar-container">
                                    <div class="progress-bar-filled" style={selectedSchedule.progressBarStyle}>
                                        {selectedSchedule.progressPercentage}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </template>

            <!-- Billings by Period View -->
            <template if:true={isPeriodView}>
                <div class="chart-container">
                    <div class="chart-y-axis">
                        <template for:each={yAxisLabels} for:item="label">
                            <div key={label} class="y-axis-label">{label}</div>
                        </template>
                    </div>

                    <div class={chartPlotClass}>
                        <div class="chart-scroll">
                            <div class="chart-inner" style={chartInnerStyle}>
                                <template if:true={hasSuspension}>
                                    <div class="chart-suspension-overlay" style={chartSuspensionOverlayStyle}>
                                        <span class="suspension-label">Suspended</span>
                                    </div>
                                </template>
                                <template if:true={hasBsgEndDate}>
                                    <div class="bsg-end-marker" style={bsgEndDateChartStyle}>
                                        <span class="bsg-end-label">{bsgEndDateLabel}</span>
                                    </div>
                                </template>
                                <div class="chart-bars-row">
                                    <template for:each={chartGroups} for:item="group">
                                        <div key={group.key} class="chart-bar-group" style={group.barGroupStyle}>
                                            <template if:true={group.isSuspended}>
                                                <div class="suspended-bar" style={group.suspendedBarStyle} title={group.tooltip}>
                                                    <span class="bar-label suspended-label">Suspended</span>
                                                </div>
                                            </template>
                                            <template if:true={group.isZero}>
                                                <div class="zero-marker" style={group.zeroBarStyle} title={group.tooltip}></div>
                                            </template>
                                            <template if:false={group.isZero}>
                                                <template if:false={group.isSuspended}>
                                                    <div class="chart-bar billing-bar"
                                                         style={group.billingBarStyle}
                                                         title={group.tooltip}>
                                                        <div class="bar-segment pending-seg" style={group.pendingSegStyle}></div>
                                                        <div class="bar-segment billed-seg"  style={group.billedSegStyle}></div>
                                                        <span class="bar-label">{group.formattedNet}</span>
                                                    </div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>
                                </div>

                                <div class="chart-x-axis">
                                    <template for:each={chartGroups} for:item="group">
                                        <div key={group.key} class="x-axis-label" style={group.xAxisLabelStyle}>
                                            {group.label}
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Period Legend -->
                <div class="chart-legend slds-m-top_small">
                    <span class="legend-item">
                        <span class="legend-swatch billed-swatch"></span>
                        <span class="slds-text-body_small">Billed</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-swatch pending-swatch"></span>
                        <span class="slds-text-body_small">Pending</span>
                    </span>
                    <template if:true={hasSuspension}>
                        <span class="legend-item">
                            <span class="legend-swatch suspended-swatch"></span>
                            <span class="slds-text-body_small">Suspended</span>
                        </span>
                    </template>
                </div>

                <!-- Billing Segments Table -->
                <template if:true={hasSegments}>
                    <div class="slds-m-top_medium">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped segments-table">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col"><div class="slds-truncate" title="Period">PERIOD</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Net Qty">NET QTY</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Periodic Billing">PERIODIC BILLING</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Credits">CREDITS</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Active Schedules">ACTIVE SCHEDULES</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Status">STATUS</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={periodTableRows} for:item="row">
                                    <tr key={row.key} class={row.rowClass}>
                                        <td>{row.label}</td>
                                        <td>{row.netQty}</td>
                                        <td>{row.formattedBilling}</td>
                                        <td>{row.formattedCredits}</td>
                                        <td>
                                            <template for:each={row.scheduleLinks} for:item="link">
                                                <span key={link.id} class="schedule-table-link">{link.label}</span>
                                            </template>
                                        </td>
                                        <td>
                                            <span class={row.statusClass}>{row.status}</span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
