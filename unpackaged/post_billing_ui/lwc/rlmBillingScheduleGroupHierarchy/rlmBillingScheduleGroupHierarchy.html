<template>
    <lightning-card>
        <!-- Header with Summary -->
        <div slot="title" class="custom-header">
            <div class="header-title">
                <lightning-icon icon-name="custom:custom57" size="small" class="header-icon"></lightning-icon>
                <h2 class="slds-text-heading_medium">Billing Schedule Groups</h2>
            </div>
            <p class="header-summary">{summaryText}</p>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <!-- Loading Spinner -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-m-around_medium">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Error Message -->
            <template if:true={error}>
                <div class="slds-m-around_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <span class="slds-assistive-text">error</span>
                        <h2>{error}</h2>
                    </div>
                </div>
            </template>

            <!-- No Data Message -->
            <template if:false={hasData}>
                <template if:false={isLoading}>
                    <template if:false={error}>
                        <div class="slds-align_absolute-center slds-m-around_large">
                            <p class="slds-text-color_weak">No Billing Schedule Groups found for this account.</p>
                        </div>
                    </template>
                </template>
            </template>

            <!-- Charge Type Tabs -->
            <template if:true={hasData}>
                <div class="charge-type-tabs">
                    <div class="tabs-left">
                        <template for:each={chargeTypeTabs} for:item="tab">
                            <button key={tab.type}
                                    class={tab.cssClass}
                                    data-type={tab.type}
                                    onclick={handleChargeTypeChange}>
                                {tab.label}
                                <span class="tab-count">{tab.count}</span>
                            </button>
                        </template>
                    </div>
                    <lightning-combobox
                        label="Sort by"
                        value={sortField}
                        options={sortOptions}
                        onchange={handleSortChange}
                        variant="label-hidden"
                        class="sort-combobox">
                    </lightning-combobox>
                </div>
            </template>

            <!-- Summary Statistics Cards -->
            <template if:true={hasData}>
                <div class="summary-grid">
                    <div class={totalCardClass} data-filter="all" role="button" tabindex="0"
                         aria-pressed={totalCardSelected} aria-label="Filter: all billing schedule groups"
                         onclick={handleStatusFilter} onkeydown={handleStatusFilterKeydown}>
                        <div class="summary-label">TOTAL</div>
                        <div class="summary-value">{totalBsgs}</div>
                    </div>
                    <div class={activeCardClass} data-filter="active" role="button" tabindex="0"
                         aria-pressed={activeCardSelected} aria-label="Filter: active billing schedule groups"
                         onclick={handleStatusFilter} onkeydown={handleStatusFilterKeydown}>
                        <div class="summary-label">ACTIVE</div>
                        <div class="summary-value summary-value-success">{activeBsgs}</div>
                    </div>
                    <div class={expiredCardClass} data-filter="expired" role="button" tabindex="0"
                         aria-pressed={expiredCardSelected} aria-label="Filter: expired billing schedule groups"
                         onclick={handleStatusFilter} onkeydown={handleStatusFilterKeydown}>
                        <div class="summary-label">EXPIRED</div>
                        <div class="summary-value summary-value-expired">{expiredBsgs}</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">BILLED AMOUNT</div>
                        <div class="summary-value summary-value-info">{formattedTotalAmount}</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">PENDING AMOUNT</div>
                        <div class="summary-value summary-value-warning">{formattedPendingAmount}</div>
                    </div>
                </div>

                <!-- Empty Filtered State -->
                <template if:false={hasGroups}>
                    <div class="slds-align_absolute-center slds-m-around_large">
                        <p class="slds-text-color_weak">No Billing Schedule Groups match the current filter.</p>
                    </div>
                </template>

                <!-- Subscriptions List -->
                <div class="bsg-list">
                    <template for:each={flattenedGroups} for:item="bsg">
                        <div key={bsg.id} class={bsg.indentClass}>
                            <!-- Parent BSG Row -->
                            <div class="bsg-row">
                                <!-- Left Section: Expand Icon + Name -->
                                <div class="bsg-left">
                                    <template if:true={bsg.hasChildren}>
                                        <template if:true={bsg.isExpanded}>
                                            <lightning-button-icon
                                                icon-name="utility:chevrondown"
                                                alternative-text="Collapse"
                                                variant="bare"
                                                size="small"
                                                onclick={handleToggle}
                                                data-id={bsg.id}
                                                class="toggle-icon">
                                            </lightning-button-icon>
                                        </template>
                                        <template if:false={bsg.isExpanded}>
                                            <lightning-button-icon
                                                icon-name="utility:chevronright"
                                                alternative-text="Expand"
                                                variant="bare"
                                                size="small"
                                                onclick={handleToggle}
                                                data-id={bsg.id}
                                                class="toggle-icon">
                                            </lightning-button-icon>
                                        </template>
                                    </template>
                                    
                                    <a href="#" onclick={handleNavigate} data-id={bsg.id} class="bsg-name">
                                        {bsg.name}
                                    </a>
                                    
                                    <span class="charge-type-badge" data-charge-type={bsg.chargeType}>{bsg.chargeTypeLabel}</span>

                                    <template if:true={bsg.hasChildren}>
                                        <span class="child-count">{bsg.childCount} items</span>
                                    </template>
                                </div>

                                <!-- Right Section: Status + Progress + Percentage + Actions -->
                                <div class="bsg-right">
                                    <template if:true={bsg.status}>
                                        <span class="status-badge" data-status={bsg.status}>{bsg.status}</span>
                                    </template>
                                    
                                    <div class="billing-progress-slot">
                                        <div class="progress-container">
                                            <div class="progress-bar">
                                                <template if:false={bsg.isUsage}>
                                                    <div style={bsg.progressStyle}></div>
                                                </template>
                                            </div>
                                        </div>
                                        <template if:false={bsg.isUsage}>
                                            <span class="percentage-badge">{bsg.billingPercentage}%</span>
                                        </template>
                                    </div>
                                    
                                    <lightning-button-icon
                                        icon-name="utility:overflow"
                                        variant="bare"
                                        alternative-text="More actions"
                                        size="small"
                                        class="action-menu">
                                    </lightning-button-icon>
                                </div>
                            </div>

                            <!-- Details Row -->
                            <div class="bsg-details">
                                <div class="detail-item">
                                    <span class="detail-label">START DATE</span>
                                    <span class="detail-value">{bsg.startDate}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">END DATE</span>
                                    <span class="detail-value">{bsg.endDate}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">NEXT BILLING DATE</span>
                                    <template if:true={bsg.nextBillingIsComplete}>
                                        <span class="detail-value detail-value-complete">{bsg.nextBillingDateDisplay}</span>
                                    </template>
                                    <template if:false={bsg.nextBillingIsComplete}>
                                        <span class="detail-value">{bsg.nextBillingDateDisplay}</span>
                                    </template>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">BILLING TERM</span>
                                    <span class="detail-value">{bsg.billingTermLabel}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">BILLED AMOUNT</span>
                                    <span class="detail-value detail-value-amount">
                                        <lightning-formatted-number
                                            value={bsg.totalAmount}
                                            format-style="currency"
                                            currency-code={currencyCode}>
                                        </lightning-formatted-number>
                                    </span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">PENDING AMOUNT</span>
                                    <span class="detail-value detail-value-pending">
                                        <lightning-formatted-number
                                            value={bsg.pendingAmount}
                                            format-style="currency"
                                            currency-code={currencyCode}>
                                        </lightning-formatted-number>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
