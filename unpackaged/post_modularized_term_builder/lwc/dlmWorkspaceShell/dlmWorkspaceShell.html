<template>
  <div class="dlm-shell">
    <template if:true={errorMessage}>
      <div class="dlm-shell__error slds-p-around_x-small slds-m-bottom_x-small" role="alert">
        <lightning-icon
          icon-name="utility:error"
          size="xx-small"
          variant="error"
          alternative-text="Error"
          class="slds-m-right_xx-small"
        ></lightning-icon>
        {errorMessage}
      </div>
    </template>

    <template if:false={hasQuote}>
      <div class="dlm-shell__empty slds-p-around_medium slds-text-color_weak">
        Open or create a negotiation to model its terms.
      </div>
    </template>

    <template if:true={hasQuote}>
      <!-- Chrome: heading + Proposal Summary / Reset actions, always visible above the tabs. -->
      <div
        class="dlm-shell__chrome slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-wrap slds-p-around_x-small"
      >
        <h2 class="dlm-shell__heading slds-text-heading_small">{effectiveHeading}</h2>
        <div class="slds-grid slds-gutters_x-small slds-grid_vertical-align-center">
          <template if:true={proposalActionVisible}>
            <div class="slds-col">
              <lightning-button
                label="Proposal Summary"
                icon-name="utility:summary"
                variant="neutral"
                disabled={proposalDisabled}
                onclick={handleOpenProposal}
              ></lightning-button>
            </div>
          </template>
          <div class="slds-col">
            <lightning-button-icon
              icon-name="utility:refresh"
              variant="border-filled"
              alternative-text="Reset model"
              title="Clear modeled discounts for this session"
              onclick={handleResetModel}
            ></lightning-button-icon>
          </div>
        </div>
      </div>

      <lightning-tabset variant="scoped" active-tab-value={activeTab} class="dlm-shell__tabs">
        <lightning-tab label={shellCreationTabLabel} value="creation" onactive={handleTabActive}>
          <div class="dlm-shell__tab-body">
            <!-- Pre-term inputs: analysis period (drives analytics), participating carriers, and a
                 client-only subsidiary picker. Emits configchange up to the shell. -->
            <c-dlm-data-set-config
              quote-id={quoteId}
              account-id={accountId}
              onconfigchange={handleConfigChange}
            ></c-dlm-data-set-config>
            <!-- Props-down fix: the embedded term workspace mounts after the LMC `context` was
                 published, so hand it quoteId / selectedTermId directly rather than relying on LMC. -->
            <c-dlm-term-workspace
              quote-id={quoteId}
              selected-term-id={selectedTermId}
            ></c-dlm-term-workspace>
          </div>
        </lightning-tab>

        <lightning-tab label={modelingTabLabel} value="modeling" onactive={handleTabActive}>
          <div class="dlm-shell__tab-body">
            <c-dlm-modeling-workspace
              selected-term={selectedTerm}
              model={activeModel}
              currency-code={currencyCode}
              carriers={participatingCarriers}
              apply-disabled={applyOfferDisabled}
              onmodelchange={handleModelChange}
              onmethodchange={handleMethodChange}
              onapplyofferrequest={handleApplyOfferRequest}
            ></c-dlm-modeling-workspace>
          </div>
        </lightning-tab>
      </lightning-tabset>
    </template>
  </div>
</template>
