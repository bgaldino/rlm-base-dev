<template>
  <!-- Term workspace tile: the scoped line grid for the selected Term + its fares, plus the Add Fare
       Class bar. Learns quoteId/selectedTermId from the DLM Term Builder channel. -->
  <template if:true={showWorkspace}>
    <lightning-card title={effectiveHeading} icon-name="standard:product_item">
      <!-- Save / Cancel hoisted onto the title row (from the scoped grid via statechange) to save
           vertical height; they drive the grid's save()/cancel(). Shown only once the grid has rows. -->
      <template if:true={showGridActions}>
        <div slot="actions" class="slds-grid slds-grid_vertical-align-center">
          <lightning-button
            label="Cancel"
            variant="neutral"
            class="slds-m-right_x-small"
            disabled={gridSaveDisabled}
            onclick={handleGridCancel}
          ></lightning-button>
          <lightning-button
            label="Save changes"
            variant="brand"
            icon-name="utility:save"
            disabled={gridSaveDisabled}
            onclick={handleGridSave}
          ></lightning-button>
        </div>
      </template>

      <div class="slds-grid slds-grid_vertical slds-gutters_direct-y">
        <!-- Scoped line grid: the selected Term + its fares only. -->
        <div class="slds-col slds-p-horizontal_small">
          <c-dlm-quote-line-grid
            record-id={quoteId}
            scope-root-line-id={selectedTermId}
            attribute-codes={effectiveAttributeCodes}
            hide-group-column={groupColumnHidden}
            onstatechange={handleGridState}
            onlinesupdated={handleLinesUpdated}
            ontermrenamed={handleLinesUpdated}
          ></c-dlm-quote-line-grid>
        </div>

        <!-- Add fare classes under the selected Term — a collapsible panel so it can be tucked away. -->
        <template if:true={addFareVisible}>
          <div class="slds-col slds-p-horizontal_small slds-p-bottom_small">
            <div class="dl-tb-fares">
              <button
                type="button"
                class="dl-tb-fares__heading slds-button_reset slds-grid slds-grid_vertical-align-center slds-p-vertical_x-small slds-p-horizontal_small"
                aria-expanded={faresExpandedStr}
                aria-controls="dl-tb-fares-body"
                onclick={toggleFares}
              >
                <lightning-icon
                  icon-name={faresChevron}
                  size="x-small"
                  class="slds-m-right_x-small"
                ></lightning-icon>
                <span>Add Fare Class</span>
              </button>
              <template if:true={faresExpanded}>
                <div id="dl-tb-fares-body">
                  <c-dlm-add-fare-class
                    quote-id={quoteId}
                    term-line-id={selectedTermId}
                    onfareadded={handleFareAdded}
                  ></c-dlm-add-fare-class>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </lightning-card>
  </template>

  <template if:false={showWorkspace}>
    <div class="slds-p-around_medium slds-text-color_weak">
      Select a Term to edit its route, requirement, and fare classes.
    </div>
  </template>
</template>
