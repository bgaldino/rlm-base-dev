<template>
  <div class="dlm-modeling">
    <template if:false={hasModel}>
      <div class="dlm-modeling__empty slds-p-around_medium slds-text-color_weak">
        Select a Term to model its fares.
      </div>
    </template>

    <template if:true={hasModel}>
      <!-- Term scope banner: the Term-level geography surfaced ONCE above the grid (not per-row). -->
      <template if:true={hasScope}>
        <div class="dlm-modeling__scope slds-box slds-box_x-small slds-m-bottom_x-small" role="group" aria-label="Term scope">
          <div class="dlm-modeling__scope-head slds-grid slds-grid_vertical-align-center slds-wrap">
            <span class="dlm-modeling__scope-name">{scopeTermName}</span>
            <template if:true={scopeRouteLabel}>
              <span class="dlm-modeling__scope-route slds-m-left_x-small">{scopeRouteLabel}</span>
            </template>
          </div>
          <div class="dlm-modeling__scope-chips slds-grid slds-wrap slds-m-top_xx-small">
            <template for:each={scopeChips} for:item="chip">
              <span key={chip.code} class="dlm-modeling__scope-chip slds-m-right_x-small slds-m-bottom_xx-small">
                <span class="dlm-modeling__scope-chip-label">{chip.label}</span>
                <span class="dlm-modeling__scope-chip-value">{chip.value}</span>
              </span>
            </template>
          </div>
        </div>
      </template>

      <!-- Participating (partner) carriers captured pre-term in Configure Data Set. Context chips only,
           never grid rows. -->
      <template if:true={hasCarriers}>
        <div class="dlm-modeling__carriers slds-grid slds-wrap slds-grid_vertical-align-center slds-m-bottom_x-small" role="group" aria-label="Participating carriers">
          <span class="dlm-modeling__carriers-label slds-m-right_x-small">Participating carriers</span>
          <template for:each={carrierChips} for:item="carrier">
            <span key={carrier.key} class="dlm-modeling__carrier-chip slds-m-right_x-small slds-m-bottom_xx-small">{carrier.label}</span>
          </template>
        </div>
      </template>

      <!-- Apply Final Offer to Quote: the shell performs the write-back on request. -->
      <div class="dlm-modeling__actions slds-grid slds-grid_align-end slds-p-bottom_x-small">
        <lightning-button
          label="Apply Final Offer to Quote"
          icon-name="utility:apex_plugin"
          variant="brand"
          disabled={applyDisabled}
          onclick={handleApplyOffer}
          title="Write the modeled Final Offer discounts back to the Quote fare lines"
        ></lightning-button>
      </div>

      <!-- The reused negotiation grid. Its modelchange / methodchange / expandtoggle events bubble
           (composed) straight through to the shell. -->
      <c-dl-modeling-grid
        term={selectedTerm}
        model={model}
        currency-code={currencyCode}
      ></c-dl-modeling-grid>
    </template>
  </div>
</template>
