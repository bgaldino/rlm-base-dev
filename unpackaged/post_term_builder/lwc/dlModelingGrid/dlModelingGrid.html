<template>
  <div class="dl-mg">
    <template if:false={hasModel}>
      <div class="slds-p-around_medium slds-text-color_weak">
        Select a Term to model its fares.
      </div>
    </template>

    <template if:true={hasModel}>
      <!-- Fare-less Term: empty-state instead of a headerless grid. -->
      <template if:false={hasRows}>
        <div class="slds-p-around_medium slds-text-color_weak">
          This Term has no fares yet — add fares in Shell Creation, then model their discounts here.
        </div>
      </template>

      <template if:true={hasRows}>
        <!-- Totals validity warning -->
        <template if:true={showTotalsWarning}>
          <div class="dl-mg-warn slds-m-horizontal_small slds-m-bottom_x-small" role="alert">
            <lightning-icon
              icon-name="utility:warning"
              size="xx-small"
              variant="warning"
              alternative-text="Warning"
              class="slds-m-right_xx-small"
            ></lightning-icon>
            Spend distribution doesn't total 100% — the projected KPI is provisional until it does.
          </div>
        </template>

        <!-- The scrollable grid. The Value column and the totals row are sticky. -->
        <div class="dl-mg-scroll">
          <table class="dl-mg-table slds-table slds-table_bordered slds-table_fixed-layout">
            <thead>
              <tr class="slds-line-height_reset">
                <th class="dl-mg-col_value" scope="col"><span title="Product">Product</span></th>
                <th scope="col"><span title="Spend % (share of existing spend on this Term)">Spend %</span></th>
                <th scope="col"><span title="Projected spend %">Projected %</span></th>
                <th scope="col"><span title="Prior-cycle discount % (read-only; from the Quote fare lines)">Prior Disc %</span></th>
                <th scope="col"><span title="Proposed Discount %">Proposed Disc %</span></th>
              </tr>
            </thead>
            <tbody>
              <template for:each={displayRows} for:item="row">
                <!-- Base data row -->
                <tr key={row.key} if:false={row.isDetail} class="dl-mg-row">
                  <th class="dl-mg-col_value" scope="row">
                    <div class="dl-mg-value-cell">
                      <button
                        if:true={row.expandable}
                        type="button"
                        class="dl-mg-expander slds-button slds-button_icon slds-m-right_xx-small"
                        title={row.expanderTitle}
                        aria-expanded={row.expandedStr}
                        aria-controls={row.detailRegionId}
                        data-key={row.key}
                        data-expander={row.key}
                        onclick={handleToggleExpand}
                      >
                        <lightning-icon
                          icon-name={row.expanderIcon}
                          size="xx-small"
                          alternative-text={row.expanderTitle}
                        ></lightning-icon>
                      </button>
                      <span class="dl-mg-value-text">
                        <span class="dl-mg-value" title={row.label}>{row.label}</span>
                        <span class="dl-mg-alliance" title={row.allianceSummary}>{row.allianceSummary}</span>
                      </span>
                    </div>
                  </th>
                  <td>
                    <lightning-input
                      type="number"
                      label="Spend %"
                      variant="label-hidden"
                      value={row.currentExistingPct}
                      min="0"
                      max="100"
                      step="0.1"
                      data-key={row.key}
                      onchange={handleCurrentExistingChange}
                    ></lightning-input>
                  </td>
                  <td>
                    <lightning-input
                      type="number"
                      label="Projected %"
                      variant="label-hidden"
                      value={row.projectedPct}
                      min="0"
                      max="100"
                      step="0.1"
                      data-key={row.key}
                      onchange={handleProjectedChange}
                    ></lightning-input>
                  </td>
                  <td>
                    <!-- Prior-cycle discount: a read-only standard field so it aligns with the
                         editable Proposed Disc % input beside it (em dash when there's no prior). -->
                    <template if:true={row.hasPrior}>
                      <lightning-input
                        type="number"
                        label="Prior Disc %"
                        variant="label-hidden"
                        value={row.priorDiscountPct}
                        step="0.1"
                        read-only
                      ></lightning-input>
                    </template>
                    <template if:false={row.hasPrior}>
                      <span class="dl-mg-derived">—</span>
                    </template>
                  </td>
                  <td>
                    <lightning-input
                      type="number"
                      label="Proposed Discount %"
                      variant="label-hidden"
                      value={row.proposedPct}
                      min="0"
                      max="100"
                      step="0.1"
                      data-key={row.key}
                      onchange={handleProposedChange}
                    ></lightning-input>
                  </td>
                </tr>

                <!-- Expanded detail row: per-row Alliance Partner multiselect. -->
                <tr key={row.key} if:true={row.isDetail} class="dl-mg-detail-row">
                  <td class="dl-mg-detail" colspan={row.colspan} id={row.detailRegionId}>
                    <lightning-dual-listbox
                      name="alliancePartners"
                      label={row.detailLabel}
                      variant="label-hidden"
                      source-label="Available"
                      selected-label="Alliance partners"
                      options={alliancePartnerOptions}
                      value={row.alliancePartnersValue}
                      data-key={row.rowKey}
                      data-detail={row.rowKey}
                      onchange={handleAllianceChange}
                    ></lightning-dual-listbox>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
    </template>
  </div>
</template>
