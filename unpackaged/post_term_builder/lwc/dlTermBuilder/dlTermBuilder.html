<template>
  <div class="dl-term-builder">
    <!-- Delta-branded app header -->
    <div class="dl-tb-header slds-p-around_medium">
      <div
        class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small"
      >
        <div class="slds-grid slds-grid_vertical-align-center">
          <img
            src={emblemUrl}
            alt=""
            class="dl-tb-header__mark"
          />
          <h1 class="dl-tb-header__title slds-m-left_small">Term Builder</h1>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center">
          <template if:true={hasQuote}>
            <a
              href={quoteRecordUrl}
              target="_blank"
              rel="noopener"
              class="dl-tb-header__quote-link slds-grid slds-grid_vertical-align-center slds-m-right_medium"
              title="Open the negotiation Quote record in a new tab"
            >
              <lightning-icon
                icon-name="utility:new_window"
                size="x-small"
                variant="inverse"
                alternative-text="Open record"
                class="slds-m-right_xx-small"
              ></lightning-icon>
              <span>Open Record</span>
            </a>
            <!-- A negotiation already related to a Contract can't be contracted again, so offer a
                 link to view it instead of a Create Contract button that would only fail. -->
            <template if:true={hasContract}>
              <a
                href={contractRecordUrl}
                target="_blank"
                rel="noopener"
                class="dl-tb-header__quote-link slds-grid slds-grid_vertical-align-center slds-m-right_medium"
                title={viewContractTitle}
              >
                <lightning-icon
                  icon-name="utility:file"
                  size="x-small"
                  variant="inverse"
                  alternative-text="View contract"
                  class="slds-m-right_xx-small"
                ></lightning-icon>
                <span>View Contract</span>
              </a>
            </template>
            <template if:false={hasContract}>
              <lightning-button
                label="Create Contract"
                variant="brand"
                disabled={contractDisabled}
                onclick={handleCreateContract}
                title="Create a Contract from this negotiation"
                class="slds-m-right_medium"
              ></lightning-button>
            </template>
          </template>
          <lightning-button
            label="New Negotiation"
            variant="brand"
            disabled={newNegotiationDisabled}
            onclick={handleNewNegotiation}
          ></lightning-button>
        </div>
      </div>

      <div
        class="dl-tb-header__panel slds-grid slds-gutters slds-wrap slds-grid_vertical-align-end slds-p-around_small"
      >
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <span class="dl-tb-header__field-label" aria-hidden="true">Account</span>
          <lightning-record-picker
            label="Account"
            variant="label-hidden"
            placeholder="Search accounts…"
            object-api-name="Account"
            value={selectedAccountId}
            matching-info={accountMatchingInfo}
            display-info={accountDisplayInfo}
            onchange={handleAccountChange}
          ></lightning-record-picker>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <span class="dl-tb-header__field-label" aria-hidden="true">Existing Negotiation</span>
          <lightning-combobox
            label="Existing Negotiation"
            variant="label-hidden"
            placeholder="Select a negotiation…"
            options={quoteOptions}
            value={quoteId}
            disabled={quoteSelectDisabled}
            onchange={handleQuoteSelect}
          ></lightning-combobox>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <span class="dl-tb-header__field-label" aria-hidden="true">Negotiation Name</span>
          <lightning-input
            type="text"
            label="Negotiation Name"
            variant="label-hidden"
            value={quoteName}
            max-length="80"
            disabled={quoteNameDisabled}
            onchange={handleQuoteNameInput}
          ></lightning-input>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <span class="dl-tb-header__field-label" aria-hidden="true">Default Start Date</span>
          <lightning-input
            type="date"
            label="Default Start Date"
            variant="label-hidden"
            value={negotiationStartDate}
            disabled={negotiationDatesDisabled}
            onchange={handleNegotiationStartDateChange}
            title="Default Start Date applied to new Term and fare lines as they're added. Existing lines are unaffected."
          ></lightning-input>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <span class="dl-tb-header__field-label" aria-hidden="true">Default End Date</span>
          <lightning-input
            type="date"
            label="Default End Date"
            variant="label-hidden"
            value={negotiationEndDate}
            disabled={negotiationDatesDisabled}
            onchange={handleNegotiationEndDateChange}
            title="Default End Date applied to new Term lines as they're added. Existing lines are unaffected."
          ></lightning-input>
        </div>
        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-bottom_xxx-small"
        >
          <lightning-button
            label="Apply to All Lines"
            variant="neutral"
            icon-name="utility:sync"
            disabled={applyDatesToAllLinesDisabled}
            onclick={handleApplyDatesToAllLines}
            class="dl-tb-cta"
            title="Apply the Default Start/End Date above to every Term and fare line already on this negotiation."
          ></lightning-button>
        </div>
      </div>

      <template if:true={creating}>
        <div
          class="slds-m-top_x-small slds-text-body_small slds-text-color_inverse-weak"
        >
          Creating negotiation…
        </div>
      </template>
    </div>

    <template if:true={errorMessage}>
      <div class="slds-p-around_small">
        <div class="slds-text-color_error" role="alert">{errorMessage}</div>
      </div>
    </template>

    <!-- Body: Terms rail (left) + Term workspace (right) -->
    <template if:true={hasQuote}>
      <div class="slds-grid slds-gutters slds-wrap slds-p-around_medium">
        <!-- Terms rail -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
          <lightning-card title="Terms" icon-name="standard:contract">
            <div class="slds-p-horizontal_small">
              <template if:true={loadingState}>
                <lightning-spinner
                  alternative-text="Loading terms"
                  size="small"
                ></lightning-spinner>
              </template>

              <template if:true={hasTerms}>
                <ul
                  class="slds-grid slds-grid_vertical slds-gutters_direct-y"
                  role="list"
                >
                  <template for:each={termCards} for:item="term">
                    <li
                      key={term.id}
                      class="slds-col slds-m-bottom_x-small"
                      role="listitem"
                    >
                      <c-dl-term-card
                        term={term}
                        selected={term.selected}
                        ontermselect={handleTermSelect}
                      ></c-dl-term-card>
                    </li>
                  </template>
                </ul>
              </template>

              <template if:false={hasTerms}>
                <p
                  class="slds-p-vertical_small slds-text-color_weak slds-text-body_small"
                >
                  No Terms yet. Add a route-based Term below to begin.
                </p>
              </template>
            </div>

            <!-- Add Term: a bare inline bar. The DL-TERM product is resolved server-side, so no
                 catalog / search / load-more is needed — just how many Terms to add, then Add. -->
            <div class="slds-p-around_small slds-m-top_small dl-tb-add-term">
              <div
                class="slds-grid slds-gutters_small slds-grid_vertical-align-end"
              >
                <div class="slds-col slds-grow-none dl-tb-add-term__count">
                  <lightning-input
                    type="number"
                    label="Terms"
                    value={addTermCount}
                    min="1"
                    max="10"
                    step="1"
                    message-when-range-overflow="Add up to 10 Terms at a time."
                    message-when-range-underflow="Add at least 1 Term."
                    onchange={handleAddTermCountChange}
                  ></lightning-input>
                </div>
                <div class="slds-col slds-p-bottom_xxx-small">
                  <lightning-button
                    label="Add Term"
                    variant="brand"
                    icon-name="utility:add"
                    disabled={addTermDisabled}
                    onclick={handleAddTerm}
                    class="dl-tb-add-term__cta"
                  ></lightning-button>
                </div>
              </div>
            </div>
          </lightning-card>
        </div>

        <!-- Term workspace -->
        <div class="slds-col slds-size_1-of-1 slds-large-size_2-of-3">
          <template if:true={showWorkspace}>
            <lightning-card
              title={selectedTermName}
              icon-name="standard:product_item"
            >
              <div class="slds-grid slds-grid_vertical slds-gutters_direct-y">
                <!-- Scoped line grid: the selected Term + its fares only. -->
                <div class="slds-col slds-p-horizontal_small">
                  <c-dl-quote-line-grid
                    record-id={quoteId}
                    scope-root-line-id={selectedTermId}
                    attribute-codes={attributeCodes}
                    hide-group-column
                    onlinesupdated={handleLinesUpdated}
                    ontermrenamed={handleLinesUpdated}
                  ></c-dl-quote-line-grid>
                </div>

                <!-- Add fare classes under the selected Term. -->
                <div
                  class="slds-col slds-p-horizontal_small slds-p-bottom_small"
                >
                  <div class="dl-tb-fares">
                    <h3
                      class="dl-tb-fares__heading slds-p-vertical_x-small slds-p-horizontal_small"
                    >
                      Add Fare Class
                    </h3>
                    <c-dl-add-fare-class
                      quote-id={quoteId}
                      term-line-id={selectedTermId}
                      onfareadded={handleFareAdded}
                    ></c-dl-add-fare-class>
                  </div>
                </div>
              </div>
            </lightning-card>
          </template>

          <template if:false={showWorkspace}>
            <div class="slds-p-around_medium slds-text-color_weak">
              Select a Term to edit its route, requirement, and fare classes.
            </div>
          </template>
        </div>
      </div>
    </template>

    <template if:false={hasQuote}>
      <div
        class="slds-p-around_large slds-align_absolute-center slds-text-color_weak"
      >
        Select an Account and start a New Negotiation to begin building Terms.
      </div>
    </template>
  </div>
</template>
