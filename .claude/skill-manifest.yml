# Cross-Repo Skill Manifest — Foundations side
#
# Purpose: advertise what each repo in the Revenue Cloud Engineering Studio
# offers, so agents working in either repo can discover and consume content
# from the other without forking or duplicating.
#
# This file is meant to ship IDENTICALLY in both Foundations (rlm-base-dev)
# and PMOS (pmos-revenue-cloud) once Phase 6.3 lands. Today it lives only
# in Foundations as the v0 reference; Sandy will mirror to PMOS.
#
# Resolution mechanism:
#   1. Consumers call load_manifest() from scripts/ai/skill_manifest.py to read
#      and normalize this file; resolve_repo_root() / resolve_path() /
#      resolve_grounding() / resolve_skill() / find_skill() / list_skills() then
#      look up specific entries against the loaded manifest. (There is no
#      resolve_manifest() function — load and resolve are separate steps so a
#      single load can back many lookups.)
#   2. Local clone paths come from env vars (FOUNDATIONS_REPO_ROOT, PMOS_REPO_ROOT)
#      OR sibling-directory fallback (../pmos-revenue-cloud, ../rlm-base-dev)
#   3. Each grounding artifact has a resolved local filesystem path
#   4. CLI: `python scripts/ai/skill_manifest.py --check | --list-skills <repo> |
#      --resolve <repo>/<kind>/<key>` exposes the same surface for diagnostics
#
# When this file changes:
#   - regenerate via cci task run generate_skill_manifest (TBD — Phase 6.3)
#   - ensure both repos commit the same file (CI gate planned for Phase 6.3.5)
#
# References:
#   - Schema doc: .agents/artifacts/ssot-comparison.md §6
#   - Consolidation pattern: .agents/artifacts/skills-consolidation-plan.md §3
#   - Validation status: .agents/artifacts/integration-claim-validation.md

