<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Revenue Cloud v66.0 — Interactive ERD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;overflow:hidden}
.app{display:flex;height:100vh;width:100vw}
/* SIDEBAR */
.sb{width:300px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.sb-hdr{padding:14px 16px;border-bottom:1px solid #334155}
.sb-hdr h1{font-size:15px;color:#60a5fa;margin-bottom:2px}
.sb-hdr small{font-size:11px;color:#64748b}
.sb-search{padding:10px 12px;border-bottom:1px solid #334155}
.sb-search input{width:100%;padding:7px 10px;background:#0f172a;border:1px solid #475569;border-radius:5px;color:#e2e8f0;font-size:12px;outline:none}
.sb-search input:focus{border-color:#60a5fa}
.sb-search input::placeholder{color:#64748b}
.sb-stats{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid #334155}
.sb-stat{flex:1;text-align:center;background:#0f172a;border-radius:4px;padding:6px 4px}
.sb-stat b{display:block;font-size:16px;color:#60a5fa}
.sb-stat span{font-size:9px;color:#64748b;text-transform:uppercase}
.sb-filters{padding:10px 12px;border-bottom:1px solid #334155;display:flex;flex-wrap:wrap;gap:4px}
.fp{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid #475569;border-radius:10px;font-size:10px;cursor:pointer;color:#94a3b8;transition:all .15s;background:transparent;user-select:none}
.fp.on{color:#fff}
.fp .d{width:7px;height:7px;border-radius:50%}
.sb-list{flex:1;overflow-y:auto;padding:4px 6px}
.sb-list::-webkit-scrollbar{width:5px}
.sb-list::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.oi{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s}
.oi:hover{background:#334155}
.oi.sel{background:#1e3a5f}
.oi .nm{color:#e2e8f0;border-left:3px solid;padding-left:7px}
.oi .bg{font-size:10px;color:#64748b;background:#0f172a;padding:1px 5px;border-radius:6px}
/* GRAPH */
.gfx{flex:1;position:relative;overflow:hidden}
.gfx svg{display:block;width:100%;height:100%}
.gfx .ctrl{position:absolute;bottom:12px;left:12px;display:flex;gap:6px}
.gfx .ctrl button{padding:5px 10px;background:#1e293b;border:1px solid #475569;border-radius:5px;color:#94a3b8;cursor:pointer;font-size:11px}
.gfx .ctrl button:hover{background:#334155;color:#e2e8f0}
.gfx .leg{position:absolute;top:12px;left:12px;background:rgba(30,41,59,.92);border:1px solid #334155;border-radius:6px;padding:10px 12px;font-size:10px}
.gfx .leg div{display:flex;align-items:center;gap:6px;margin:3px 0;color:#94a3b8}
.gfx .leg .lc{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tt{position:fixed;background:#1e293b;border:1px solid #475569;border-radius:6px;padding:10px;pointer-events:none;z-index:300;max-width:260px;opacity:0;transition:opacity .12s;font-size:11px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.tt.vis{opacity:1}
.tt h4{color:#f1f5f9;font-size:12px;margin-bottom:3px}
.tt .ti{color:#94a3b8;font-size:10px}
/* DETAIL */
.dp{position:absolute;right:0;top:0;width:420px;height:100vh;background:#1e293b;border-left:1px solid #334155;z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.dp.open{transform:translateX(0)}
.dp-hdr{padding:14px 16px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:flex-start}
.dp-hdr h2{font-size:15px;font-family:Menlo,Monaco,monospace;color:#f1f5f9}
.dp-hdr .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;color:#fff;margin-top:4px}
.dp-hdr .fc{font-size:11px;color:#64748b;margin-top:3px}
.dp-close{background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1}
.dp-close:hover{color:#e2e8f0}
.dp-body{flex:1;overflow-y:auto}
.dp-body::-webkit-scrollbar{width:5px}
.dp-body::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.sec{border-bottom:1px solid #334155}
.sec-h{padding:9px 16px;background:#0f172a;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#64748b;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sec-h:hover{background:#141d2e}
.sec-h .ar{font-size:8px;transition:transform .15s}
.sec-h .ar.shut{transform:rotate(-90deg)}
.sec-c{display:block}
.sec-c.hide{display:none}
.fr{padding:7px 16px;border-bottom:1px solid rgba(51,65,85,.4);font-size:11px}
.fr:hover{background:rgba(51,65,85,.3)}
.fn{font-family:Menlo,Monaco,monospace;font-size:10px;color:#e2e8f0}
.ft{float:right;font-size:9px;color:#64748b}
.fd{color:#94a3b8;font-size:9px;margin-top:2px;line-height:1.3}
.fref{color:#60a5fa;cursor:pointer;font-size:10px}
.fref:hover{text-decoration:underline}
.ro{display:inline-block;background:#0f172a;color:#60a5fa;padding:3px 7px;border-radius:3px;margin:2px;cursor:pointer;font-size:10px;font-family:Menlo,Monaco,monospace}
.ro:hover{background:#334155}
/* Light theme overrides */
body.light{background:#f8fafc;color:#1e293b}
body.light .sb{background:#ffffff;border-right-color:#e2e8f0}
body.light .sb-hdr{border-bottom-color:#e2e8f0}
body.light .sb-hdr h1{color:#1e40af}
body.light .sb-hdr small{color:#64748b}
body.light .sb-search{border-bottom-color:#e2e8f0}
body.light .sb-search input{background:#f1f5f9;border-color:#cbd5e1;color:#1e293b}
body.light .sb-search input:focus{border-color:#2563eb}
body.light .sb-search input::placeholder{color:#94a3b8}
body.light .sb-stats{border-bottom-color:#e2e8f0}
body.light .sb-stat{background:#f1f5f9}
body.light .sb-stat b{color:#1e40af}
body.light .sb-stat span{color:#64748b}
body.light .sb-filters{border-bottom-color:#e2e8f0}
body.light .fp{border-color:#cbd5e1;color:#64748b}
body.light .fp.on{color:#1e293b}
body.light .sb-list::-webkit-scrollbar-thumb{background:#cbd5e1}
body.light .oi:hover{background:#f1f5f9}
body.light .oi.sel{background:#dbeafe}
body.light .oi .nm{color:#1e293b}
body.light .oi .bg{color:#64748b;background:#f1f5f9}
body.light .gfx .ctrl button{background:#ffffff;border-color:#cbd5e1;color:#64748b}
body.light .gfx .ctrl button:hover{background:#f1f5f9;color:#1e293b}
body.light .gfx .leg{background:rgba(255,255,255,.95);border-color:#e2e8f0}
body.light .gfx .leg div{color:#64748b}
body.light .tt{background:#ffffff;border-color:#e2e8f0;box-shadow:0 4px 12px rgba(0,0,0,.1)}
body.light .tt h4{color:#1e293b}
body.light .tt .ti{color:#64748b}
body.light .dp{background:#ffffff;border-left-color:#e2e8f0}
body.light .dp-hdr{border-bottom-color:#e2e8f0}
body.light .dp-hdr h2{color:#1e293b}
body.light .dp-hdr .fc{color:#64748b}
body.light .dp-close{color:#94a3b8}
body.light .dp-close:hover{color:#1e293b}
body.light .dp-body::-webkit-scrollbar-thumb{background:#cbd5e1}
body.light .sec{border-bottom-color:#e2e8f0}
body.light .sec-h{background:#f8fafc;color:#64748b}
body.light .sec-h:hover{background:#f1f5f9}
body.light .fr{border-bottom-color:rgba(226,232,240,.5)}
body.light .fr:hover{background:rgba(241,245,249,.5)}
body.light .fn{color:#1e293b}
body.light .ft{color:#94a3b8}
body.light .fd{color:#64748b}
body.light .fref{color:#2563eb}
body.light .ro{background:#f1f5f9;color:#2563eb}
body.light .ro:hover{background:#e2e8f0}
body.light .theme-btn{background:#ffffff;border-color:#cbd5e1;color:#64748b}
body.light .theme-btn:hover{background:#f1f5f9;color:#1e293b}
.theme-btn svg{width:14px;height:14px;fill:currentColor;vertical-align:middle;margin-right:3px}
.ver-badge{display:inline-block;font-size:9px;background:#1e3a5f;color:#60a5fa;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;font-weight:600}
body.light .ver-badge{background:#dbeafe;color:#1e40af}
.help-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.help-overlay.hidden{display:none}
.help-box{background:#1e293b;border:1px solid #475569;border-radius:8px;padding:20px 24px;max-width:360px;color:#e2e8f0;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.help-box h3{font-size:14px;margin-bottom:12px;color:#f1f5f9}
.help-box table{width:100%;border-collapse:collapse}
.help-box td{padding:4px 0}
.help-box kbd{display:inline-block;background:#0f172a;border:1px solid #475569;border-radius:3px;padding:1px 6px;font-family:Menlo,Monaco,monospace;font-size:11px;color:#94a3b8;min-width:24px;text-align:center}

.dp-search{padding:8px 16px;border-bottom:1px solid #334155}
.dp-search input{width:100%;padding:5px 8px;background:#0f172a;border:1px solid #475569;border-radius:4px;color:#e2e8f0;font-size:11px;outline:none}

let showLbl=true,showLnk=true,activeDom=new Set(Object.keys(COLS)),selNode=null;

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('sObj').textContent=D.nodes.length;
  document.getElementById('sFld').textContent=D.nodes.reduce((s,n)=>s+n.fc,0).toLocaleString();
  document.getElementById('sRel').textContent=D.links.length;
  buildFilters();buildList();buildLegend();buildGraph();
  document.getElementById('srch').addEventListener('input',updVis);
  document.getElementById('dpSrch').addEventListener('input',filterDPFields);

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    // Skip if user is typing in an input
    if (e.target.tagName === 'INPUT') {
      if (e.key === 'Escape') { e.target.blur(); closeDP(); }
      return;
    }
    if (e.key === 'Escape') {
      var help = document.getElementById('helpOverlay');
      if (!help.classList.contains('hidden')) { togHelp(); }
      else { closeDP(); }
    } else if (e.key === '/') {
      e.preventDefault();
      document.getElementById('srch').focus();
    } else if (e.key === '?') {
      togHelp();
    }
  });

  // URL hash routing on load
  var hash = window.location.hash;
  if (hash && hash.startsWith('#object=')) {
    var objName = decodeURIComponent(hash.substring(8));
    setTimeout(function() { selObj(objName); }, 2600);
  }
  window.addEventListener('hashchange', function() {
    var h = window.location.hash;
    if (h && h.startsWith('#object=')) {
      var name = decodeURIComponent(h.substring(8));
      selObj(name);
    } else if (!h || h === '#') {
      closeDP();
    }
  });
});

function buildFilters(){
  const c=document.getElementById('filters');
  const doms={};
  D.nodes.forEach(n=>{doms[n.dom]=(doms[n.dom]||0)+1});
  Object.entries(doms).sort((a,b)=>b[1]-a[1]).forEach(([d,cnt])=>{
    const b=document.createElement('span');
    b.className='fp on';b.dataset.dom=d;
    b.innerHTML='<span class="d" style="background:'+COLS[d]+'"></span>'+d+' <span style="opacity:.5">'+cnt+'</span>';
    b.style.background=COLS[d]+'22';
    b.onclick=()=>{
      if(activeDom.has(d)){activeDom.delete(d);b.classList.remove('on');b.style.background='transparent'}
      else{activeDom.add(d);b.classList.add('on');b.style.background=COLS[d]+'22'}
      updVis();
    };
    c.appendChild(b);
  });
}

function buildList(){
  const l=document.getElementById('olist');
  [...D.nodes].sort((a,b)=>a.id.localeCompare(b.id)).forEach(n=>{
    const d=document.createElement('div');
    d.className='oi';d.dataset.id=n.id;
    d.innerHTML='<span class="nm" style="border-color:'+n.c+'">'+n.id+'</span><span class="bg">'+n.fc+'</span>';
    d.onclick=()=>selObj(n.id);
    l.appendChild(d);
  });
}

function buildLegend(){
  const l=document.getElementById('leg');
  Object.entries(COLS).forEach(([d,c])=>{
    l.innerHTML+='<div><span class="lc" style="background:'+c+'"></span>'+d+'</div>';
  });
}

function buildGraph(){
  const W=document.getElementById('gfx').clientWidth;
  const H=document.getElementById('gfx').clientHeight;
  gSvg=d3.select('#svg');
  gSvg.attr('viewBox',[0,0,W,H]);

  gSvg.append('defs').append('marker')
    .attr('id','arr').attr('viewBox','0 -3 6 6').attr('refX',14).attr('refY',0)
    .attr('markerWidth',4).attr('markerHeight',4).attr('orient','auto')
    .append('path').attr('d','M0,-3L6,0L0,3').attr('fill','#64748b');

  gG=gSvg.append('g');

  zoomBeh=d3.zoom().scaleExtent([0.05,10]).on('zoom',e=>gG.attr('transform',e.transform));
  gSvg.call(zoomBeh);
  gSvg.on('click',e=>{if(e.target===gSvg.node())closeDP()});

  // LINKS
  gLink=gG.append('g').attr('stroke','#64748b').attr('stroke-width',0.8)
    .selectAll('line').data(D.links).join('line')
    .attr('opacity',0.5).attr('marker-end','url(#arr)');

  // NODE groups
  const ng=gG.append('g').selectAll('g').data(D.nodes).join('g')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

  gNode=ng.append('circle')
    .attr('r',d=>Math.max(4,Math.min(20,3+Math.sqrt(d.fc)*1.8)))
    .attr('fill',d=>d.c).attr('stroke','#0f172a').attr('stroke-width',1.5).attr('cursor','pointer')
    .on('click',(e,d)=>{e.stopPropagation();selObj(d.id)})
    .on('mouseenter',showTT).on('mouseleave',hideTT);

  gLabel=ng.append('text').text(d=>d.id)
    .attr('font-size',d=>Math.max(5,Math.min(9,4+Math.sqrt(d.fc)*.6)))
    .attr('fill','#94a3b8').attr('text-anchor','middle')
    .attr('dy',d=>Math.max(4,Math.min(20,3+Math.sqrt(d.fc)*1.8))+10)
    .attr('pointer-events','none');

  // SIMULATION
  sim=d3.forceSimulation(D.nodes)
    .force('link',d3.forceLink(D.links).id(d=>d.id).distance(70).strength(0.25))
    .force('charge',d3.forceManyBody().strength(-90).distanceMax(500))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide().radius(d=>Math.sqrt(d.fc)*2+10))
    .force('x',d3.forceX(W/2).strength(0.02))
    .force('y',d3.forceY(H/2).strength(0.02))
    .on('tick',()=>{
      gLink.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      ng.attr('transform',d=>'translate('+d.x+','+d.y+')');
    });

  setTimeout(fitView,2500);
}

function showTT(e,d){
  const t=document.getElementById('tt');
  t.innerHTML='<h4>'+d.id+'</h4><div class="ti">'+d.dom+(d.std?' (Core)':'')+'</div><div class="ti">'+d.fc+' fields ('+d.rf.length+' lookup, '+d.df.length+' data)</div><div class="ti" style="color:#60a5fa;margin-top:3px">Click for detail</div>';
  t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-8)+'px';
  t.classList.add('vis');
}
function hideTT(){document.getElementById('tt').classList.remove('vis')}

function updVis(){
  const q=document.getElementById('srch').value.toLowerCase();
  gNode.attr('opacity',d=>{
    if(!activeDom.has(d.dom))return 0.04;
    if(q&&!d.id.toLowerCase().includes(q)&&!fieldMatch(d,q))return 0.08;
    return 1;
  });
  gLabel.attr('opacity',d=>{
    if(!activeDom.has(d.dom))return 0;
    if(q&&!d.id.toLowerCase().includes(q)&&!fieldMatch(d,q))return 0;
    return showLbl?1:0;
  });
  gLink.attr('opacity',d=>{
    const sH=!activeDom.has(d.source.dom),tH=!activeDom.has(d.target.dom);
    return(sH||tH)?0.02:(showLnk?0.5:0);
  });
  document.querySelectorAll('.oi').forEach(el=>{
    const n=D.nodes.find(x=>x.id===el.dataset.id);
    if(!n)return;
    const vis=activeDom.has(n.dom)&&(!q||n.id.toLowerCase().includes(q)||fieldMatch(n,q));
    el.style.display=vis?'flex':'none';
  });
}
function fieldMatch(d,q){
  return[...d.rf,...d.df].some(f=>f.n.toLowerCase().includes(q)||(f.d&&f.d.toLowerCase().includes(q)));
}

function selObj(id){
  selNode=id;
  const nd=D.nodes.find(n=>n.id===id);
  if(!nd)return;
  var defStroke=document.body.classList.contains('light')?'#ffffff':'#0f172a';
  // Build set of connected node IDs for this selection
  var connIds=new Set([id]);
  D.links.forEach(function(l){
    var sid=typeof l.source==='object'?l.source.id:l.source;
    var tid=typeof l.target==='object'?l.target.id:l.target;
    if(sid===id)connIds.add(tid);
    if(tid===id)connIds.add(sid);
  });
  // Highlight selected node, dim unconnected nodes
  gNode.attr('stroke',d=>d.id===id?'#60a5fa':defStroke)
    .attr('stroke-width',d=>d.id===id?3:1.5)
    .attr('opacity',d=>connIds.has(d.id)?1:0.15);
  gLabel.attr('opacity',d=>connIds.has(d.id)&&showLbl?1:0);
  // Highlight connected links, dim the rest
  var isLight=document.body.classList.contains('light');
  gLink.attr('stroke',d=>{
    var sid=typeof d.source==='object'?d.source.id:d.source;
    var tid=typeof d.target==='object'?d.target.id:d.target;
    return(sid===id||tid===id)?(isLight?'#475569':'#94a3b8'):(isLight?'#94a3b8':'#64748b');
  }).attr('stroke-width',d=>{
    var sid=typeof d.source==='object'?d.source.id:d.source;
    var tid=typeof d.target==='object'?d.target.id:d.target;
    return(sid===id||tid===id)?2:0.8;
  }).attr('opacity',d=>{
    var sid=typeof d.source==='object'?d.source.id:d.source;
    var tid=typeof d.target==='object'?d.target.id:d.target;
    return(sid===id||tid===id)?0.9:0.07;
  });
  document.querySelectorAll('.oi').forEach(e=>{e.classList.toggle('sel',e.dataset.id===id)});
  const li=document.querySelector('.oi[data-id="'+id+'"]');
  if(li)li.scrollIntoView({block:'nearest'});

  document.getElementById('dpNm').textContent=id;
  const dt=document.getElementById('dpDom');
  dt.textContent=nd.dom+(nd.std?' (Core Object)':'');dt.style.background=nd.c;
  document.getElementById('dpFc').textContent=nd.fc+' fields';

  // Clear field search
  document.getElementById('dpSrch').value='';

  const body=document.getElementById('dpBody');
  body.innerHTML='';
  if(nd.rf.length)body.innerHTML+=mkSec('Relationships ('+nd.rf.length+')',nd.rf,true);
  if(nd.df.length)body.innerHTML+=mkSec('Data Fields ('+nd.df.length+')',nd.df,true);

  // Related objects
  const out=D.links.filter(l=>(typeof l.source==='object'?l.source.id:l.source)===id);
  const inc=D.links.filter(l=>(typeof l.target==='object'?l.target.id:l.target)===id);
  if(out.length||inc.length){
    let h='<div class="sec"><div class="sec-h" onclick="togSec(this)">Related Objects ('+(out.length+inc.length)+') <span class="ar">&#9660;</span></div><div class="sec-c">';
    out.forEach(l=>{
      const tid=typeof l.target==='object'?l.target.id:l.target;
      h+='<div class="fr"><span class="fref" onclick="selObj(\''+tid+'\')">&rarr; '+tid+'</span><span class="ft">via '+l.field+'</span></div>';
    });
    inc.forEach(l=>{
      const sid=typeof l.source==='object'?l.source.id:l.source;
      h+='<div class="fr"><span class="fref" onclick="selObj(\''+sid+'\')" style="color:#22c55e">&larr; '+sid+'</span><span class="ft">via '+l.field+'</span></div>';
    });
    h+='</div></div>';body.innerHTML+=h;
  }
  document.getElementById('dp').classList.add('open');

  // Update URL hash without polluting history
  try { history.replaceState(null, '', '#object=' + encodeURIComponent(id)); } catch(e) {}
}

function mkSec(title,fields,open){
  let h='<div class="sec"><div class="sec-h" onclick="togSec(this)">'+title+' <span class="ar'+(open?'':' shut')+'">&#9660;</span></div><div class="sec-c'+(open?'':' hide')+'">';
  fields.forEach(f=>{
    h+='<div class="fr"><div class="fn">'+f.n+'<span class="ft">'+f.t+'</span></div>';
    if(f.r){
      const refs=f.r.split(',').map(r=>r.trim()).filter(Boolean);
      refs.forEach(r=>{
        if(D.nodes.find(n=>n.id===r))h+='<span class="fref" onclick="selObj(\''+r+'\')">&rarr; '+r+'</span> ';
      });
    }
    if(f.d)h+='<div class="fd">'+f.d+'</div>';
    h+='</div>';
  });
  h+='</div></div>';return h;
}

function togSec(el){
  const c=el.nextElementSibling,a=el.querySelector('.ar');
  c.classList.toggle('hide');a.classList.toggle('shut');
}
function closeDP(){
  document.getElementById('dp').classList.remove('open');
  var strokeC=document.body.classList.contains('light')?'#ffffff':'#0f172a';
  var linkC=document.body.classList.contains('light')?'#94a3b8':'#64748b';
  gNode.attr('stroke',strokeC).attr('stroke-width',1.5).attr('opacity',1);
  gLabel.attr('opacity',showLbl?1:0);
  gLink.attr('stroke',linkC).attr('stroke-width',0.8).attr('opacity',showLnk?0.5:0);
  document.querySelectorAll('.oi').forEach(e=>e.classList.remove('sel'));
  selNode=null;
  document.getElementById('dpSrch').value='';
  try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch(e) {}
}
function fitView(){
  const b=gG.node().getBBox();
  if(b.width===0)return;
  const W=document.getElementById('gfx').clientWidth,H=document.getElementById('gfx').clientHeight;
  const s=.85/Math.max(b.width/W,b.height/H);
  const tx=W/2-(b.x+b.width/2)*s,ty=H/2-(b.y+b.height/2)*s;
  gSvg.transition().duration(700).call(zoomBeh.transform,d3.zoomIdentity.translate(tx,ty).scale(s));
}
function resetAll(){
  activeDom=new Set(Object.keys(COLS));
  document.querySelectorAll('.fp').forEach(b=>{b.classList.add('on');b.style.background=COLS[b.dataset.dom]+'22'});
  document.getElementById('srch').value='';
  updVis();closeDP();fitView();
}
function togLbl(){showLbl=!showLbl;gLabel.transition().attr('opacity',showLbl?1:0)}
function togLnk(){showLnk=!showLnk;gLink.transition().attr('opacity',showLnk?.5:0)}
function togTheme(){
const isLight=document.body.classList.toggle('light');
const moonPath='M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z';
const sunPath='M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM12 1v2m0 18v2m-9-11H1m22 0h-2m-2.64-6.36l-1.41 1.41M6.05 17.95l-1.41 1.41m0-14.72l1.41 1.41m11.9 11.9l1.41 1.41';
document.getElementById('themeIcon').setAttribute('d',isLight?sunPath:moonPath);
document.getElementById('themeLbl').textContent=isLight?'Dark':'Light';
if(typeof gNode!=='undefined'&&gNode)gNode.attr('stroke',isLight?'#ffffff':'#0f172a');
if(typeof gLink!=='undefined'&&gLink)gLink.transition().attr('stroke',isLight?'#94a3b8':'#64748b');
d3.select('#arr path').attr('fill',isLight?'#94a3b8':'#64748b');
if(typeof gLabel!=='undefined'&&gLabel)gLabel.attr('fill',isLight?'#475569':'#94a3b8');
try{localStorage.setItem('erd-theme',isLight?'light':'dark')}catch(e){}
}
function exportSVG() {
  var svgEl = document.getElementById('svg');
  var clone = svgEl.cloneNode(true);
  // Apply current zoom transform to the cloned SVG's inner group
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  // Set a white/dark background rect based on theme
  var isLight = document.body.classList.contains('light');
  var bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bgRect.setAttribute('width', '100%');
  bgRect.setAttribute('height', '100%');
  bgRect.setAttribute('fill', isLight ? '#f8fafc' : '#0f172a');
  clone.insertBefore(bgRect, clone.firstChild);
  var serializer = new XMLSerializer();
  var svgStr = serializer.serializeToString(clone);
  var blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'revenue-cloud-erd.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function togHelp() {
  document.getElementById('helpOverlay').classList.toggle('hidden');
}

function filterDPFields() {
  var q = document.getElementById('dpSrch').value.toLowerCase();
  var rows = document.querySelectorAll('#dpBody .fr');
  rows.forEach(function(row) {
    var text = row.textContent.toLowerCase();
    row.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
  // Update section headers with visible count
  document.querySelectorAll('#dpBody .sec').forEach(function(sec) {
    var visible = sec.querySelectorAll('.fr:not([style*="display: none"])').length;
    var total = sec.querySelectorAll('.fr').length;
    if (q && total > 0) {
      var hdr = sec.querySelector('.sec-h');
      var origText = hdr.textContent.replace(/\s*\(\d+\/\d+\)/, '').replace(/\s*\(\d+\)/, '').replace(/\s*▼/, '');
      hdr.innerHTML = origText + ' (' + visible + '/' + total + ') <span class="ar">&#9660;</span>';
    }
  });
}

try{if(localStorage.getItem('erd-theme')==='light'){togTheme()}}catch(e){}
</script>
