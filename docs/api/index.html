<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Cloud API Reference — Spring '26 v66.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#334155;
  --text:#e2e8f0;--muted:#94a3b8;--faint:#64748b;
  --accent:#60a5fa;--accent2:#3b82f6;
  --get:#22c55e;--post:#3b82f6;--put:#f97316;--delete:#ef4444;--patch:#eab308;
}
body.light{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#1e293b;--muted:#475569;--faint:#94a3b8;
  --accent:#2563eb;--accent2:#1d4ed8;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;z-index:100}
.topbar h1{font-size:15px;color:var(--accent);font-weight:600;white-space:nowrap}
.version-badge{font-size:10px;background:#1e3a5f;color:#93c5fd;padding:2px 8px;border-radius:10px;border:1px solid #2563eb;white-space:nowrap}
.topbar-search{flex:1;max-width:400px;position:relative}
.topbar-search input{width:100%;padding:6px 12px 6px 32px;background:var(--bg);border:1px solid var(--surface2);border-radius:6px;color:var(--text);font-size:12px;outline:none}
.topbar-search input:focus{border-color:var(--accent)}
.topbar-search input::placeholder{color:var(--faint)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;max-height:320px;overflow-y:auto;z-index:200;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.search-results.open{display:block}
.sr-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border)}
.sr-item:last-child{border:none}
.sr-item:hover{background:var(--surface2)}
.sr-item .sr-title{color:var(--text);font-weight:500}
.sr-item .sr-path{color:var(--faint);font-family:Menlo,Monaco,monospace;font-size:10px;margin-top:2px}
.sr-item .sr-domain{font-size:10px;color:var(--accent);margin-bottom:2px}
.theme-btn{margin-left:auto;padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;font-size:11px;white-space:nowrap}
.theme-btn:hover{color:var(--text)}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
.nav-section{border-bottom:1px solid var(--border)}
.nav-domain{padding:8px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.nav-domain:hover{background:var(--surface2)}
.nav-domain .arrow{font-size:9px;transition:transform .15s}
.nav-domain.collapsed .arrow{transform:rotate(-90deg)}
.nav-items{overflow:hidden}
.nav-items.hidden{display:none}
.nav-item{display:block;padding:6px 14px 6px 22px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(59,130,246,.08)}
.nav-item.tab-item{padding:8px 14px;font-size:13px;color:var(--text);font-weight:500;border-left:3px solid transparent}
.nav-item.tab-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(59,130,246,.1)}
.nav-item.tab-item:hover{background:var(--surface2)}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;padding:32px 40px;max-width:960px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* CONTENT SECTIONS */
.tab-content{display:none}
.tab-content.active{display:block}

h1.page-title{font-size:26px;color:var(--text);margin-bottom:6px;font-weight:700}
h2.page-subtitle{font-size:13px;color:var(--muted);font-weight:400;margin-bottom:28px}
h2.section-heading{font-size:18px;color:var(--text);margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:600}
h3.endpoint-title{font-size:14px;color:var(--text);margin:0;font-weight:600}
h4.sub-heading{font-size:13px;color:var(--muted);margin:16px 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:11px}

/* ENDPOINT CARDS */
.endpoint-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.endpoint-header{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.endpoint-header:hover{background:var(--surface2)}
.endpoint-body{padding:16px;border-top:1px solid var(--border);display:none}
.endpoint-body.open{display:block}
.endpoint-toggle{margin-left:auto;color:var(--faint);font-size:11px}

/* METHOD BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;font-family:Menlo,Monaco,monospace;letter-spacing:.5px;flex-shrink:0}
.badge-GET{background:rgba(34,197,94,.15);color:var(--get);border:1px solid rgba(34,197,94,.3)}
.badge-POST{background:rgba(59,130,246,.15);color:var(--post);border:1px solid rgba(59,130,246,.3)}
.badge-PUT{background:rgba(249,115,22,.15);color:var(--put);border:1px solid rgba(249,115,22,.3)}
.badge-DELETE{background:rgba(239,68,68,.15);color:var(--delete);border:1px solid rgba(239,68,68,.3)}
.badge-PATCH{background:rgba(234,179,8,.15);color:var(--patch);border:1px solid rgba(234,179,8,.3)}
.badge-DEPRECATED{background:rgba(100,116,139,.15);color:var(--faint);border:1px solid rgba(100,116,139,.3)}

.endpoint-path{font-family:Menlo,Monaco,monospace;font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0 16px}
th{text-align:left;padding:8px 10px;background:var(--surface2);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid rgba(51,65,85,.4);color:var(--text);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(30,41,59,.4)}
body.light tr:nth-child(even) td{background:rgba(241,245,249,.6)}
td code{font-family:Menlo,Monaco,monospace;font-size:11px;background:var(--bg);padding:1px 4px;border-radius:3px;color:var(--accent)}

/* CODE BLOCKS */
pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 14px;overflow-x:auto;font-size:11px;line-height:1.6;margin:8px 0}
pre code{font-family:Menlo,Monaco,monospace;color:var(--muted)}
code.inline{font-family:Menlo,Monaco,monospace;font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--accent)}

/* DESCRIPTION */
.desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.version-tag{font-size:10px;color:var(--faint);background:var(--surface2);padding:2px 6px;border-radius:4px;margin-left:8px}

/* OVERVIEW LAYOUT */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.ov-card h3{font-size:13px;color:var(--accent);margin-bottom:8px;font-weight:600}
.ov-card ul{list-style:none;padding:0}
.ov-card ul li{font-size:12px;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(51,65,85,.3);display:flex;align-items:center;gap:6px}
.ov-card ul li:last-child{border:none}

.workflow-steps{counter-reset:steps}
.workflow-step{display:flex;gap:12px;margin:8px 0;align-items:flex-start}
.step-num{width:22px;height:22px;background:var(--accent2);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-text{font-size:12px;color:var(--muted);line-height:1.5}

/* ALERT / INFO BOXES */
.info-box{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:6px;padding:12px 14px;margin:12px 0;font-size:12px;color:var(--muted);line-height:1.5}
.warn-box{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25);border-radius:6px;padding:12px 14px;margin:12px 0;font-size:12px;color:var(--muted);line-height:1.5}

/* QUICK REF TABLE */
.qr-section{margin-bottom:24px}
.qr-section h3{font-size:13px;color:var(--text);margin-bottom:8px;font-weight:600}
.qr-list{display:flex;flex-direction:column;gap:4px}
.qr-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:5px;font-size:12px}
.qr-item .qr-path{font-family:Menlo,Monaco,monospace;font-size:11px;color:var(--muted);flex:1}

/* MOBILE */
@media(max-width:768px){
  .sidebar{width:200px}
  .main{padding:20px}
  .overview-grid{grid-template-columns:1fr}
  .topbar h1{font-size:13px}
}
@media(max-width:540px){
  .sidebar{display:none}
  .main{padding:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>Revenue Cloud API Reference</h1>
  <span class="version-badge">Spring '26 · v66.0</span>
  <div class="topbar-search">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="Search endpoints, paths, descriptions..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
  <button class="theme-btn" id="themeBtn">Light Mode</button>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const TABS = [
  { id: 'overview', label: 'Overview', icon: '' },
  { id: 'pcm', label: 'PCM', icon: '' },
  { id: 'discovery', label: 'Product Discovery', icon: '' },
  { id: 'configurator', label: 'Product Configurator', icon: '' },
  { id: 'pricing', label: 'Pricing', icon: '' },
  { id: 'rate', label: 'Rate Management', icon: '' },
  { id: 'transaction', label: 'Transaction Management', icon: '' },
  { id: 'usage', label: 'Usage Management', icon: '' },
  { id: 'billing', label: 'Billing', icon: '' },
  { id: 'context', label: 'Context Service', icon: '' },
  { id: 'master', label: 'Master Reference', icon: '' },
];

const DOMAINS = {
  pcm: {
    title: 'Product Catalog Management',
    subtitle: 'PCM APIs — Direct catalog access (19 endpoints)',
    sections: [
      {
        id: 'pcm-catalog', title: 'Catalog APIs',
        endpoints: [
          { method:'POST', path:'/connect/pcm/catalogs', title:'List Catalogs', version:'57.0',
            desc:'Retrieve a paginated list of all product catalogs in the org.',
            fields:[
              {name:'pageSize',type:'Integer',req:false,desc:'Number of records to return per page (default: 100)'},
              {name:'offset',type:'Integer',req:false,desc:'Pagination offset'},
              {name:'q',type:'String',req:false,desc:'Search query string to filter catalogs by name'},
            ]},
          { method:'GET', path:'/connect/pcm/catalogs/{catalogId}', title:'Get Catalog', version:'57.0',
            desc:'Retrieve details of a specific product catalog by its Salesforce record ID.',
            params:[{name:'catalogId',desc:'Salesforce ID of the catalog record. Use {{defaultCatalogId}} from the Setup Runner.'}]},
        ]
      },
      {
        id: 'pcm-category', title: 'Category APIs',
        endpoints: [
          { method:'GET', path:'/connect/pcm/catalogs/{catalogId}/categories', title:'List Categories', version:'57.0',
            desc:'List all categories belonging to a specific catalog.',
            params:[{name:'catalogId',desc:'Salesforce ID of the catalog. Use {{defaultCatalogId}}.'}]},
          { method:'GET', path:'/connect/pcm/categories/{categoryId}', title:'Get Category', version:'57.0',
            desc:'Retrieve details of a specific product category by its Salesforce record ID.',
            params:[{name:'categoryId',desc:'Salesforce ID of the category record. Use {{defaultCategoryId}} from the Setup Runner.'}]},
        ]
      },
      {
        id: 'pcm-product', title: 'Product APIs',
        endpoints: [
          { method:'POST', path:'/connect/pcm/products', title:'List Products', version:'57.0',
            desc:'Retrieve a paginated, filterable list of products from the catalog. Supports sorting and filter criteria.',
            fields:[
              {name:'pageSize',type:'Integer',req:false,desc:'Number of records to return (default: 100)'},
              {name:'offset',type:'Integer',req:false,desc:'Pagination offset'},
              {name:'filters',type:'Array',req:false,desc:'Array of filter objects to narrow results'},
              {name:'sortBy',type:'String',req:false,desc:'Field to sort results by (e.g., "Name")'},
              {name:'sortOrder',type:'String',req:false,desc:'Sort direction — "ASC" or "DESC"'},
            ]},
          { method:'GET', path:'/connect/pcm/products/{productId}', title:'Get Product', version:'57.0',
            desc:'Retrieve the full details of a single product by its Salesforce record ID.',
            params:[{name:'productId',desc:'Salesforce ID of the product.'}]},
          { method:'POST', path:'/connect/pcm/products/bulk', title:'Bulk Product Details', version:'59.0',
            desc:'Retrieve full product details for multiple products in a single request.',
            fields:[{name:'productIds',type:'Array of String',req:true,desc:'List of Salesforce product record IDs'}]},
          { method:'POST', path:'/connect/pcm/products/{productId}/related-records', title:'Product Related Records', version:'59.0',
            desc:'Retrieve related records for a product, such as variants and bundles.',
            params:[{name:'productId',desc:'Salesforce ID of the product'}],
            fields:[{name:'relationshipTypes',type:'Array of String',req:true,desc:'Relationship types to retrieve: "VARIANTS", "BUNDLES"'}]},
          { method:'POST', path:'/connect/pcm/products/classification', title:'Product Classification Details', version:'66.0',
            desc:'Retrieve classification details including product hierarchy and attribute assignments. New in Spring \'26 (v66.0).',
            fields:[
              {name:'productIds',type:'Array of String',req:true,desc:'List of Salesforce product record IDs'},
              {name:'includeHierarchy',type:'Boolean',req:false,desc:'When true, returns the full classification hierarchy (default: true)'},
            ]},
          { method:'POST', path:'/connect/pcm/products/{productId}/actions/deep-clone', title:'Deep Clone Product', version:'59.0',
            desc:'Create a full deep copy of a product, including its attributes and relationships.',
            params:[{name:'productId',desc:'Salesforce ID of the product to clone'}],
            fields:[
              {name:'cloneName',type:'String',req:true,desc:'Name for the cloned product'},
              {name:'cloneAttributes',type:'Boolean',req:false,desc:'Include product attributes in the clone (default: true)'},
              {name:'cloneRelationships',type:'Boolean',req:false,desc:'Include product relationships in the clone (default: true)'},
            ]},
        ]
      },
      {
        id: 'pcm-index', title: 'Index APIs',
        endpoints: [
          { method:'GET', path:'/connect/pcm/index/configurations', title:'Index Configuration Collection', version:'61.0',
            desc:'Retrieve the current product index configurations. The product index drives search performance in Product Discovery APIs.'},
          { method:'PUT', path:'/connect/pcm/index/configurations', title:'Update Index Configuration', version:'61.0',
            desc:'Replace the full set of product index configurations.',
            fields:[{name:'indexConfigurations',type:'Array',req:true,desc:'Array of index config objects with id, name, and fields[]'}]},
          { method:'GET', path:'/connect/pcm/index/setting', title:'Index Setting', version:'61.0',
            desc:'Retrieve global index settings including whether indexing is enabled and the auto-index frequency.'},
          { method:'PATCH', path:'/connect/pcm/index/setting', title:'Update Index Setting', version:'61.0',
            desc:'Update global product index settings.',
            fields:[
              {name:'indexingEnabled',type:'Boolean',req:false,desc:'Enable or disable product indexing'},
              {name:'autoIndexFrequency',type:'String',req:false,desc:'"DAILY", "WEEKLY", or "MANUAL"'},
              {name:'batchSize',type:'Integer',req:false,desc:'Number of products to process per indexing batch'},
            ]},
          { method:'GET', path:'/connect/pcm/index/snapshots', title:'Snapshot Collection', version:'61.0',
            desc:'List all available product index snapshots.'},
          { method:'POST', path:'/connect/pcm/index/snapshots/{snapshotId}/actions/deploy', title:'Deploy Snapshot', version:'61.0',
            desc:'Deploy a specific index snapshot. Snapshots must be deployed before product search reflects catalog changes.',
            params:[{name:'snapshotId',desc:'ID of the snapshot to deploy'}],
            fields:[{name:'options.deploymentStrategy',type:'String',req:false,desc:'"INCREMENTAL" or "FULL"'}]},
          { method:'GET', path:'/connect/pcm/index/snapshots/{snapshotId}/errors', title:'Snapshot Index Error', version:'61.0',
            desc:'Retrieve any errors that occurred during a snapshot deployment.',
            params:[{name:'snapshotId',desc:'ID of the snapshot to check for errors'}]},
        ]
      },
      {
        id: 'pcm-uom', title: 'Unit of Measure APIs',
        endpoints: [
          { method:'GET', path:'/connect/pcm/unit-of-measure', title:'Unit of Measure Info', version:'59.0',
            desc:'Retrieve metadata about all units of measure (UoM) configured in the org.'},
          { method:'POST', path:'/connect/pcm/unit-of-measure/actions/round', title:'Unit of Measure Rounded Data', version:'59.0',
            desc:'Calculate the rounded quantity for a given value based on a specified unit of measure and precision.',
            fields:[
              {name:'quantity',type:'Decimal',req:true,desc:'The raw quantity value to round'},
              {name:'unitOfMeasure',type:'String',req:true,desc:'The UoM code to apply (e.g., "LITRE", "EACH", "GB")'},
              {name:'decimalPlaces',type:'Integer',req:true,desc:'Number of decimal places to round to'},
            ]},
        ]
      },
    ]
  },

  discovery: {
    title: 'Product Discovery',
    subtitle: 'Context-aware catalog access — POST-only, buyer-session scoped (10 endpoints)',
    sections: [
      {
        id: 'disc-catalog', title: 'Catalog APIs',
        endpoints: [
          { method:'POST', path:'/connect/cpq/catalogs', title:'List Catalogs', version:'57.0',
            desc:'Retrieve a list of catalogs visible to the current buyer context. Returns only catalogs the buyer is entitled to see.',
            fields:[{name:'pageSize',type:'Integer',req:false,desc:'Number of catalog records to return (default: 100)'}]},
          { method:'POST', path:'/connect/cpq/catalogs/{catalogId}', title:'Get Catalog', version:'57.0',
            desc:'Retrieve details of a specific catalog in the buyer context.',
            params:[{name:'catalogId',desc:'Salesforce ID of the catalog. Use {{defaultCatalogId}}.'}]},
        ]
      },
      {
        id: 'disc-category', title: 'Category APIs',
        endpoints: [
          { method:'POST', path:'/connect/cpq/categories', title:'List Categories', version:'57.0',
            desc:'List product categories available to the buyer. Filters out categories containing no entitled products.',
            fields:[{name:'pageSize',type:'Integer',req:false,desc:'Number of category records to return (default: 100)'}]},
          { method:'POST', path:'/connect/cpq/categories/{categoryId}', title:'Get Category', version:'57.0',
            desc:'Retrieve details of a specific category in the buyer context.',
            params:[{name:'categoryId',desc:'Salesforce ID of the category. Use {{defaultCategoryId}}.'}]},
        ]
      },
      {
        id: 'disc-product', title: 'Product APIs',
        endpoints: [
          { method:'POST', path:'/connect/cpq/products', title:'List Products', version:'57.0',
            desc:'Retrieve a filtered, paginated list of products for a buyer session. Applies entitlements and optionally pricing context.',
            fields:[
              {name:'pageSize',type:'Integer',req:false,desc:'Number of products to return per page (default: 100)'},
              {name:'offset',type:'Integer',req:false,desc:'Pagination offset for subsequent pages'},
              {name:'filters',type:'Array',req:false,desc:'Filter criteria objects to narrow the result set'},
            ]},
          { method:'POST', path:'/connect/cpq/products/{productId}', title:'Get Product', version:'57.0',
            desc:'Retrieve the full details of a single product in a buyer context. Returns pricing, attribute, and entitlement data.',
            params:[{name:'productId',desc:'Salesforce ID of the product'}]},
          { method:'POST', path:'/connect/cpq/products/search', title:'Global Search', version:'61.0',
            desc:'Perform a full-text search across the product catalog within the buyer context. Requires the product index to be deployed.',
            fields:[
              {name:'query',type:'String',req:true,desc:'Search string to match against product names, descriptions, and indexed fields'},
              {name:'pageSize',type:'Integer',req:false,desc:'Number of results to return (default: 100)'},
              {name:'filters',type:'Array',req:false,desc:'Additional filter criteria to narrow search results'},
            ]},
          { method:'POST', path:'/connect/cpq/products/bulk', title:'Bulk Product Details', version:'59.0',
            desc:'Retrieve context-aware details for multiple products in a single request.',
            fields:[{name:'productIds',type:'Array of String',req:true,desc:'List of Salesforce product record IDs to retrieve'}]},
        ]
      },
      {
        id: 'disc-guided', title: 'Guided Selling & Qualification',
        endpoints: [
          { method:'POST', path:'/connect/cpq/products/guided-selection', title:'Guided Selection', version:'59.0',
            desc:'Execute a guided selling flow to recommend products based on account characteristics and buyer-provided criteria.',
            fields:[
              {name:'accountId',type:'String',req:true,desc:'Salesforce ID of the buyer account. Use {{defaultAccountId}}.'},
              {name:'criteria',type:'Object',req:true,desc:'Key-value pairs representing the buyer\'s answers to guided selling questions'},
            ]},
          { method:'POST', path:'/connect/cpq/qualification', title:'Qualification', version:'59.0',
            desc:'Evaluate whether an account qualifies for specific products or promotions based on configured qualification rules.',
            fields:[
              {name:'accountId',type:'String',req:true,desc:'Salesforce ID of the account to evaluate. Use {{defaultAccountId}}.'},
              {name:'qualificationCriteria',type:'Object',req:true,desc:'Criteria specifying the qualification type (ACCOUNT_BASED, PRODUCT_BASED)'},
            ]},
        ]
      },
    ]
  },

  configurator: {
    title: 'Product Configurator',
    subtitle: 'Bundle configuration with session-based instance management (13 endpoints)',
    sections: [
      {
        id: 'cfg-action', title: 'Configuration Actions',
        endpoints: [
          { method:'POST', path:'/connect/cpq/configurator/actions/configure', title:'Configure', version:'59.0',
            desc:'Initialize a new configuration session for a product. Returns a configuration instance with option groups, rules, and constraints applied. Entry point for interactive configuration flows.',
            fields:[
              {name:'productId',type:'String',req:true,desc:'Salesforce ID of the product to configure'},
              {name:'selectedOptions',type:'Array',req:false,desc:'Initial option selections to pre-populate the configuration'},
            ]},
        ]
      },
      {

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────

function badge(method) {
  const m = method === 'DEPRECATED' ? 'DEPRECATED' : method;
  return `<span class="badge badge-${m}">${method}</span>`;
}

function renderTable(rows, cols) {
  if (!rows || !rows.length) return '';
  const headers = cols.map(c => `<th>${c.label}</th>`).join('');
  const body = rows.map(r => {
    const cells = cols.map(c => {
      let v = r[c.key] || '';
      if (c.key === 'req') v = r.req ? '<span style="color:var(--delete)">Required</span>' : '<span style="color:var(--faint)">Optional</span>';
      if (c.key === 'name') v = `<code>${v}</code>`;
      return `<td>${v}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  return `<table><thead><tr>${headers}</tr></thead><tbody>${body}</tbody></table>`;
}

function renderEndpoint(ep, sectionId) {
  const epId = `ep-${sectionId}-${ep.path.replace(/[^a-z0-9]/gi,'-')}`;
  const parts = [];

  if (ep.desc) parts.push(`<p class="desc">${ep.desc}</p>`);
  if (ep.note) parts.push(`<div class="info-box">${ep.note}</div>`);

  if (ep.params && ep.params.length) {
    parts.push('<h4 class="sub-heading">Path Parameters</h4>');
    parts.push(renderTable(ep.params, [
      {key:'name',label:'Parameter'},{key:'desc',label:'Description'}
    ]));
  }
  if (ep.query && ep.query.length) {
    parts.push('<h4 class="sub-heading">Query Parameters</h4>');
    parts.push(renderTable(ep.query, [
      {key:'name',label:'Parameter'},{key:'desc',label:'Description'}
    ]));
  }
  if (ep.fields && ep.fields.length) {
    parts.push('<h4 class="sub-heading">Request Body Fields</h4>');
    parts.push(renderTable(ep.fields, [
      {key:'name',label:'Field'},{key:'type',label:'Type'},{key:'req',label:'Required'},{key:'desc',label:'Description'}
    ]));
  }

  const body = parts.length
    ? `<div class="endpoint-body" id="body-${epId}">${parts.join('')}</div>`
    : '';

  return `
  <div class="endpoint-card" id="${epId}">
    <div class="endpoint-header" onclick="toggleEp('body-${epId}',this)">
      ${badge(ep.method)}
      <span class="endpoint-path">${ep.path}</span>
      <span class="endpoint-title" style="font-size:12px;color:var(--text);white-space:nowrap;margin-left:8px">${ep.title}</span>
      <span class="version-tag">${ep.version}</span>
      <span class="endpoint-toggle">${body ? '&#9662;' : ''}</span>
    </div>
    ${body}
  </div>`;
}

function renderSection(section) {
  const eps = section.endpoints.map(ep => renderEndpoint(ep, section.id)).join('');
  return `
  <div id="${section.id}">
    <h2 class="section-heading">${section.title}</h2>
    ${eps}
  </div>`;
}

function renderDomainPage(domainId, domain) {
  const sections = domain.sections.map(s => renderSection(s)).join('');
  return `
  <div class="tab-content" id="tab-${domainId}">
    <h1 class="page-title">${domain.title}</h1>
    <p class="page-subtitle">${domain.subtitle}</p>
    ${sections}
  </div>`;
}

// ─── BUILD SIDEBAR ────────────────────────────────────────────────────────────

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';

  TABS.forEach(tab => {
    const domain = DOMAINS[tab.id];
    if (!domain) {
      html += `<div class="nav-section">
        <div class="nav-item tab-item${tab.id === currentTab ? ' active' : ''}" data-tab="${tab.id}" onclick="switchTab('${tab.id}')">${tab.label}</div>
      </div>`;
      return;
    }
    const collapsed = tab.id !== currentTab ? ' collapsed' : '';
    const hidden = tab.id !== currentTab ? ' hidden' : '';
    html += `<div class="nav-section">
      <div class="nav-domain${collapsed}" data-tab="${tab.id}" onclick="toggleDomain(this,'${tab.id}')">
        <span>${tab.label}</span><span class="arrow">&#9662;</span>
      </div>
      <div class="nav-items${hidden}" id="nav-items-${tab.id}">
        ${domain.sections.map(s =>
          `<div class="nav-item" data-section="${s.id}" onclick="switchTab('${tab.id}');setTimeout(()=>scrollTo('${s.id}'),80)">${s.title}</div>`
        ).join('')}
      </div>
    </div>`;
  });

  sidebar.innerHTML = html;
}

// ─── BUILD CONTENT ────────────────────────────────────────────────────────────

function buildContent() {
  const main = document.getElementById('mainContent');
  let html = renderOverview();
  Object.entries(DOMAINS).forEach(([id, domain]) => {
    html += renderDomainPage(id, domain);
  });
  html += renderMaster();
  main.innerHTML = html;
}

// ─── STATE & NAVIGATION ───────────────────────────────────────────────────────

let currentTab = 'overview';

function switchTab(tabId) {
  if (currentTab === tabId) return;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item.tab-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('tab-' + tabId);
  if (el) el.classList.add('active');
  document.querySelectorAll(`[data-tab="${tabId}"]`).forEach(el => el.classList.add('active'));
  currentTab = tabId;
  document.getElementById('mainContent').scrollTop = 0;
  buildSidebar();
}

function toggleDomain(el, tabId) {
  const items = document.getElementById('nav-items-' + tabId);
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    items.classList.remove('hidden');
    switchTab(tabId);
  } else {
    el.classList.add('collapsed');
    items.classList.add('hidden');
  }
}

function scrollTo(sectionId) {
  const el = document.getElementById(sectionId);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

function toggleEp(bodyId, header) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  body.classList.toggle('open');
  const toggle = header.querySelector('.endpoint-toggle');
  if (toggle) toggle.innerHTML = body.classList.contains('open') ? '&#9652;' : '&#9662;';
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }
  const hits = searchIndex.filter(item =>
    item.title.toLowerCase().includes(q) ||
    item.path.toLowerCase().includes(q) ||
    item.desc.toLowerCase().includes(q) ||
    item.method.toLowerCase().includes(q)
  ).slice(0, 12);

  if (!hits.length) { searchResults.classList.remove('open'); return; }
  searchResults.innerHTML = hits.map(h => `
    <div class="sr-item" onclick="goToResult('${h.domainId}','${h.sectionId}','${h.id}')">
      <div class="sr-domain">${h.domainLabel}</div>
      <div class="sr-title">${badge(h.method)} ${h.title}</div>
      <div class="sr-path">${h.path}</div>
    </div>`).join('');
  searchResults.classList.add('open');
});

function goToResult(domainId, sectionId, epId) {
  searchResults.classList.remove('open');
  searchInput.value = '';
  switchTab(domainId);
  setTimeout(() => {
    const el = document.getElementById(epId) || document.getElementById(sectionId);
    if (el) {
      el.scrollIntoView({behavior:'smooth', block:'start'});
      // open the endpoint body
      const body = el.querySelector('.endpoint-body');
      if (body && !body.classList.contains('open')) {
        body.classList.add('open');
        const toggle = el.querySelector('.endpoint-toggle');
        if (toggle) toggle.innerHTML = '&#9652;';
      }
    }
  }, 100);
}

document.addEventListener('click', function(e) {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.classList.remove('open');
  }
});

// ─── THEME ────────────────────────────────────────────────────────────────────

const themeBtn = document.getElementById('themeBtn');
themeBtn.addEventListener('click', function() {
  document.body.classList.toggle('light');
  this.textContent = document.body.classList.contains('light') ? 'Dark Mode' : 'Light Mode';
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

buildContent();
buildSidebar();
// activate initial tab
document.getElementById('tab-overview').classList.add('active');
</script>
