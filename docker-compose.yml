services:
  cci-robot:
    build:
      context: .
      dockerfile: Dockerfile
    image: rlm-base-cci-robot:latest
    container_name: rlm-base-cci-robot
    env_file:
      - .env
    volumes:
      # Mount your project directory
      - .:/workspace
      # Isolated Docker auth/config state (prevents host keychain/auth drift)
      - ./.docker/state/cumulusci:/root/.cumulusci
      - ./.docker/state/sf:/root/.sf
      - ./.docker/state/sfdx:/root/.sfdx
    working_dir: /workspace
    environment:
      # CumulusCI settings
      - CUMULUSCI_DISABLE_ANALYTICS=true
      - CUMULUSCI_KEYCHAIN_CLASS=cumulusci.core.keychain.EnvironmentProjectKeychain
      - SFDX_AUTH_URL=${SFDX_AUTH_URL:?Set SFDX_AUTH_URL in .env}
      # SF CLI settings
      - SF_AUTOUPDATE_DISABLE=true
      # Keep encryption enabled by default; allow explicit opt-out only for break-glass troubleshooting.
      - SF_DISABLE_ENCRYPTION=${SF_DISABLE_ENCRYPTION:-false}
      # Robot Framework/Selenium settings for headless mode
      - CHROME_BIN=/usr/bin/chromium
      - CHROMIUM_FLAGS=--no-sandbox --disable-dev-shm-usage --disable-gpu
    stdin_open: true
    tty: true
    # Default to bridge for portability; set DOCKER_NETWORK_MODE=host for host networking.
    network_mode: ${DOCKER_NETWORK_MODE:-bridge}

# Docker state is intentionally repo-local under ./.docker/state to isolate auth.
