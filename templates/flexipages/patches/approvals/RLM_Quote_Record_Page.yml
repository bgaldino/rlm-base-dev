feature: approvals
feature_flag: approvals
# Adds approval submission action and approval-tracking fields to the Quote record page.
# Note: All fields use RLM_ prefix (not RC_) per project naming standards.
patches:
  - type: insert_action
    after: "CreateContract"
    actions:
      - "Quote.RLM_Submit_for_Approval"

  - type: add_display_field
    field: "QuoteLineItem.RLM_Approval__c"

  - type: add_display_field
    field: "QuoteLineItem.RLM_Margin_Approval__c"

  - type: add_facet_field
    facet: "Quote Information"
    after: "Description"
    fields:
      - "RLM_Approval_Status__c"
      - "RLM_Payment_Terms__c"

  - type: add_facet_field
    facet: "System Information"
    after: "ValidationResult"
    fields:
      - "RLM_Approval_Level__c"

  - type: add_facet_field
    facet: "System Information"
    after: "RLM_Approval_Level__c"
    fields:
      - "RLM_Margin_Approval_Level__c"
