feature: prm_pricing
feature_flag: prm_pricing
# Adds PRM pricing columns to the Quote Sales Transaction Line Editor.
patches:
  - type: add_sales_txn_line_editor_field
    property: displayFields
    after: "QuoteLineItem.NetUnitPrice"
    fields:
      - "QuoteLineItem.RLM_Distributor_Discount_Percent__c"
      - "QuoteLineItem.PartnerDiscountPercent"
      - "QuoteLineItem.RLM_Partner_Net_Total_Price__c"
      - "QuoteLineItem.RLM_Distributor_Unit_Price__c"
      - "QuoteLineItem.PartnerUnitPrice"
      - "QuoteLineItem.Margin"
      - "QuoteLineItem.MarginAmount"
      - "QuoteLineItem.UnitCost"
