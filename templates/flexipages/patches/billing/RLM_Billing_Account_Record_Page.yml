feature: billing
feature_flag: billing
# Adds the standard "Generate Statement of Account" action (GenerateStatementOfAccount)
# to the Billing Account highlights panel, after the Create Credit Memo action. Gated on
# billing=true so the standard action only resolves when the Billing platform feature is
# provisioned. This page itself is billing_ui-gated; the billing patch runs before the
# billing_ui patch, so GenerateStatementOfAccount is present as the anchor when the
# billing_ui patch inserts Create Billing Schedule Group after it. The custom
# Account.RLM_Generate_Account_Statement quick action is no longer referenced here.
patches:
  - type: insert_action
    after: "CreateCreditMemo"
    actions:
      - "GenerateStatementOfAccount"
