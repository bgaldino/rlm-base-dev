feature: large_stx
feature_flag: large_stx
# Adds the Set Up Quote screen action to the Account highlights panel.
# Anchors after "Edit" (always present in the base flexipage) so the patch
# works independently of the qb/utils feature flag that adds RLM_QuickQuote.
patches:
  - type: insert_action
    after: "Edit"
    actions:
      - "Account.RLM_Set_Up_Quote"
