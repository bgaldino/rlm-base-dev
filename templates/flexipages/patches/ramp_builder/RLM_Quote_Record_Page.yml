feature: ramp_builder
feature_flag: ramps
# Repositions the proposal creation action to appear before CreateOrder.
# The standard CreateRampSchedule action is now in the base template.
patches:
  # Move RLM_Create_Proposal from after RLM_CreateContract (where docgen
  # placed it) to before CreateOrder — skip if docgen wasn't active.
  - type: remove_action
    action: "Quote.RLM_Create_Proposal"
    ignore_missing: true

  # Insert proposal action after CreateRampSchedule (standard action in base),
  # preserving the order: BrowseCatalog → CreateRampSchedule → RLM_Create_Proposal
  - type: insert_action
    after: "CreateRampSchedule"
    actions:
      - "Quote.RLM_Create_Proposal"
