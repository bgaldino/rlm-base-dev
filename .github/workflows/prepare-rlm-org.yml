name: Prepare RLM Org

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: prepare-rlm-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare-rlm-org:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      CHROME_BIN: /usr/bin/google-chrome
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-node22

      - name: Install sf CLI and SFDMU plugin
        run: |
          npm install -g @salesforce/cli
          sf plugins install sfdmu
          sf --version
          sf plugins list

      - name: Install CumulusCI and dependencies
        run: |
          pip install cumulusci "setuptools<71"
          pip install -r robot/requirements.txt
          cci version

      - name: Verify environment
        run: |
          node --version
          sf --version
          cci version
          sf plugins list
          python --version
          python -c "import robot; print('Robot Framework OK')"
          python -c "import SeleniumLibrary; print('SeleniumLibrary OK')"

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url --stdin --set-default-dev-hub --alias devhub

      - name: Create scratch org
        run: |
          cci org scratch test-sb0 test-org --default

      - name: Run prepare_rlm_org
        run: |
          cci flow run prepare_rlm_org --org test-org

      - name: Delete scratch org
        if: always()
        run: |
          cci org scratch_delete test-org || true
