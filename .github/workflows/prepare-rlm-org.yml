name: Prepare RLM Org

on:
  workflow_dispatch:
    inputs:
      org_alias:
        description: "Scratch org alias to create"
        required: false
        default: "test-org"

jobs:
  prepare-rlm-org:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CHROME_BIN: /usr/bin/google-chrome
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-node22

      - name: Install sf CLI and SFDMU plugin
        run: |
          npm install -g @salesforce/cli
          sf plugins install sfdmu
          sf --version
          sf plugins

      - name: Install CumulusCI and dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip "setuptools>=75.4,<77"
          .venv/bin/pip install "cumulusci==4.8.1" "webdriver-manager>=4,<5"
          .venv/bin/pip install -r robot/requirements.txt
          echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
          .venv/bin/cci version

      - name: Verify environment
        run: |
          node --version
          sf --version
          cci version
          sf plugins
          python --version
          python -c "import robot; print('Robot Framework OK')"
          python -c "import SeleniumLibrary; print('SeleniumLibrary OK')"
          python -c "import webdriver_manager; print('webdriver-manager OK')"
          SFDMU_VERSION=$(sf plugins --json | python -c "
import json, sys
data = json.load(sys.stdin)
plugins = data if isinstance(data, list) else data.get('result', data.get('plugins', []))
match = [p for p in plugins if isinstance(p, dict) and p.get('name') == 'sfdmu']
if not match:
    print('ERROR: sfdmu plugin not found', file=sys.stderr); sys.exit(1)
print(match[0]['version'])
")
          echo "SFDMU version: $SFDMU_VERSION"
          python -c "
import sys
v = '$SFDMU_VERSION'
parts = v.split('.')
if not parts[0].isdigit():
    print(f'ERROR: could not parse SFDMU version: {v}', file=sys.stderr); sys.exit(1)
major = int(parts[0])
if major < 5:
    print(f'ERROR: SFDMU v5+ required, got {v}', file=sys.stderr); sys.exit(1)
print(f'SFDMU v{v} meets minimum requirement (v5+)')
"

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > /tmp/sfdx-auth-url.txt
          sf org login sfdx-url --sfdx-url-file /tmp/sfdx-auth-url.txt --set-default-dev-hub --alias devhub
          rm /tmp/sfdx-auth-url.txt

      - name: Create scratch org
        run: |
          cci org scratch test-sb0 ${{ inputs.org_alias }} --default

      - name: Run prepare_rlm_org
        run: |
          cci flow run prepare_rlm_org --org ${{ inputs.org_alias }}

      - name: Delete scratch org
        if: always()
        run: |
          cci org scratch_delete ${{ inputs.org_alias }} --no-prompt || true
