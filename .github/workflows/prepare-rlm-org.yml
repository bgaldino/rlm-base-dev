name: Prepare RLM Org

on:
  workflow_dispatch:
    inputs:
      org_alias:
        description: "Scratch org alias to create"
        required: false
        default: "test-org"

jobs:
  prepare-rlm-org:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CHROME_BIN: /usr/bin/google-chrome
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-node22

      - name: Install sf CLI and SFDMU plugin
        run: |
          npm install -g @salesforce/cli
          sf plugins install sfdmu
          sf --version
          sf plugins

      - name: Install CumulusCI and dependencies
        run: |
          pip install setuptools "cumulusci>=4.0.0"
          pip install "webdriver-manager>=4,<5" "urllib3>=2.6.3"
          cci version

      - name: Verify environment
        run: |
          node --version
          sf --version
          cci version
          sf plugins
          python --version
          python -c "import robot; print('Robot Framework OK')"
          python -c "import SeleniumLibrary; print('SeleniumLibrary OK')"
          python -c "import webdriver_manager; print('webdriver-manager OK')"

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url --stdin --set-default-dev-hub --alias devhub

      - name: Create scratch org
        run: |
          cci org scratch test-sb0 ${{ inputs.org_alias }} --default

      - name: Run prepare_rlm_org
        run: |
          cci flow run prepare_rlm_org --org ${{ inputs.org_alias }}

      - name: Delete scratch org
        if: always()
        run: |
          cci org scratch_delete ${{ inputs.org_alias }} || true
